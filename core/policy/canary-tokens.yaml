# canary 는 비밀 값 — 그 값을 안다는 것 자체가 유출·침해의 직접 증거(자기인증).
# 원본 토큰은 미끼 자산에 심고 .env/시크릿 스토어로만 관리한다. 여기엔 해시만.
# 매칭: 들어온 ioc 를 sha256 해시해 이 집합과 멤버십 검사.
# 이 hit 은 신뢰 관측 채널(Observation.canary_hit)을 통해서만 CONFIRMED_TP 로 승격.
# Spec: docs/superpowers/specs/2026-07-08-deception-decoy-layer-design.md
# =============================================================================

