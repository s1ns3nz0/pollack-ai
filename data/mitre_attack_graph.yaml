  T0832: { name: "Manipulation of View", framework: "ATT&CK ICS" }
  T0862: { name: "Supply Chain Compromise", framework: "ATT&CK ICS" }
  T0857: { name: "System Firmware", framework: "ATT&CK ICS" }
