name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # 1. 코드 품질 검사 (black / ruff / mypy)
  # ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -e ".[dev]"

      - name: black (포매터 검사)
        run: black --check .

      - name: ruff (린터)
        run: ruff check .

      - name: mypy (타입 검사)
        run: mypy .

  # ─────────────────────────────────────────
  # 2. 테스트
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest --tb=short

  # ─────────────────────────────────────────
  # 3. CodeQL — SAST (시큐어 코딩 정적 분석)
  # GHAS 라이선스 필요 (private repo)
  # ─────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL 초기화
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-extended: SQL injection, XSS, 경로 탐색 등 추가 쿼리
          queries: security-extended

      - name: CodeQL 분석
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ─────────────────────────────────────────
  # 4. Dependency Review — PR에서 취약 의존성 차단
  # ─────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # CVSS 7.0 이상 취약점 포함된 의존성 PR 머지 차단
          fail-on-severity: high
          comment-summary-in-pr: always
