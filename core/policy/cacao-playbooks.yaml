        commands:
          - { type: manual, command: "운용자 승인 후 안전 파라미터 롤백, 자율 페일세이프 대기(즉시 자동조정 금지)" }
        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:ImpairProcessControl:Disrupt" }
        on_completion: "action--eradicate"
      action--contain-auto:
        type: action
        name: "자동 적격 봉쇄"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "저-임무위험 — 검증된 파라미터 자동 롤백 적격" }
        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:ImpairProcessControl:Detect" }
        on_completion: "action--eradicate"
      action--eradicate:
        type: action
        name: "축출 — 위조 명령원 제거"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "위조 명령원 축출 + GNSS 신뢰도 강등 유지" }
        labels: { phase: eradicate, nist_ir: "IR-4", source_ref: "recovery:ImpairProcessControl:evict:0" }
        on_completion: "action--recover"
      action--recover:
        type: action
        name: "복구 — INS/센서퓨전 항법 복구"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "INS/센서퓨전 기반 항법 복구 + 제어로직 재검증" }
        labels: { phase: recover, nist_ir: "IR-4", source_ref: "recovery:ImpairProcessControl:restore:0" }
        external_references:
          - { source_name: "nist-800-184", external_id: "Tactical-Recovery", url: "https://csrc.nist.gov/pubs/sp/800/184/final", description: "Event Recovery" }
