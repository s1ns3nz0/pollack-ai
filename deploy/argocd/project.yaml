# ArgoCD AppProject — UAV SOC 워크로드 경계(소스 repo/대상 네임스페이스 제한).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dah-soc
  namespace: argocd
spec:
  description: "UAV AI SOC 워크로드(핫패스/학습/RAGFlow)"
  sourceRepos:
    - https://github.com/s1ns3nz0/pollack-ai.git
    - https://prometheus-community.github.io/helm-charts # 모니터링 스택(helm)
  destinations:
    - server: https://kubernetes.default.svc
      namespace: dah-soc
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  # 자동 동기화로 인한 사고 방지 — 위험 리소스는 화이트리스트로만.
