# =====================================================================
# ci-enhanced.yml — 기존 .github/workflows/ci.yml 의 강화 버전.
#
# 변경 요약(기존 대비 추가):
#   + secret-scan : Gitleaks (이력 + staged) — Critical 차단
#   + semgrep     : p/python p/security-audit — High 차단
#   + pip-audit   : SCA 보완 — High 차단
#   + oscal-schema: trestle validate 5종 — 경고(차단 X)
#   + build       : docker buildx -> GHCR (OIDC, sha-<git-sha> 태그)
#   + container-scan: Trivy image (Critical 차단, High 경고)
#   + sbom         : Syft SBOM -> artifact 90일 보존
#   ~ test         : coverage 임계(전체 80% / 핵심경로 90%) 추가
#   ~ 모든 third-party action 은 SHA 핀 + 버전 주석(공급망 무결성)
#
# 유지(기존):
#   test(pytest), codeql, dependency-review
#
# 책임 분리(F-040 정정 / F-016 재발 방지):
#   - 본 워크플로(ci-enhanced.yml)는 *보안·테스트·빌드* 단독 담당:
#       secret-scan / oscal-schema / test / codeql / semgrep / dependency-review /
#       pip-audit / build / container-scan / sbom
#   - **lint / typecheck / complexity / docstring / convention 은 ci-quality-patch.yml 단독 담당.**
#     같은 PR/push 에서 두 워크플로가 병렬 실행되되 중복 잡 없음(PR 1건당 verify-builder 호출 6→2회 축소).
#
# 라운드 B (옵션 1, 빌더 이미지 핀):
#   - 모든 잡은 ghcr.io/s1ns3nz0/uav-soc-builder@${vars.BUILDER_IMAGE_DIGEST} 컨테이너 안에서 실행.
#   - 잡 첫 step 은 항상 `cosign verify` — 공급망 무결성 강제(서명 실패 시 잡 중단).
#   - 도구는 모두 빌더 이미지에 핀 — 잡 YAML 의 `pip install` 단계 제거.
#   - 예외(컨테이너 외부): `build` 잡 — docker buildx + GHCR push 는 호스트 docker daemon 필요.
#
# 배포 시 주의:
#   - 본 파일은 _workspace 초안. 실제 적용 시 .github/workflows/ci.yml 을
#     대체하거나 ci.yml 에 머지한다.
#   - GHCR push 는 push to develop/main 한정(PR 빌드는 push: false).
# =====================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 워크플로 전역은 최소권한. 잡 단위로만 권한 확장.
permissions:
  contents: read

# 동일 브랜치 중복 실행 취소(비용·러너 절약).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: s1ns3nz0/uav-ai-soc
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────
  # 0a. verify-builder — 빌더 이미지 cosign 서명 검증(공급망 게이트, 모든 잡의 부모)
  #     컨테이너 외부에서 한 번만 검증 → 후속 잡들은 needs 로 의존.
  # ─────────────────────────────────────────
  verify-builder:
    name: Verify builder image (cosign keyless)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      packages: read
    steps:
      - name: cosign 설치
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1
      - name: BUILDER_IMAGE_DIGEST 존재 검증
        # 미설정 시 다운스트림 잡이 image 풀에서 실패 — 명확한 에러 메시지 제공.
        run: |
          if [ -z "${{ vars.BUILDER_IMAGE_DIGEST }}" ]; then
            echo "::error::vars.BUILDER_IMAGE_DIGEST 미설정 — build-builder.yml 부트스트랩 필요. README.md §9 참고."
            exit 1
          fi
      - name: cosign verify (uav-soc-builder)
        run: |
          cosign verify \
            --certificate-identity-regexp '^https://github\.com/s1ns3nz0/pollack-ai/\.github/workflows/build-builder\.yml@refs/heads/main$' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}

  # ─────────────────────────────────────────
  # 0b. setup — 의존성 캐시 워밍 (화이트리스트, 라운드 B 이후 사실상 무용)
  #    사유: actions/setup-python 의 hosttoolcache 의존 + 빌더 이미지가 이미 도구 보유.
  #    후속 잡들이 컨테이너 안에서 실행되므로 호스트 pip cache 가 공유되지 않음.
  #    그래도 호환성 위해 잡 자체는 유지(기존 needs 그래프 보존). 향후 라운드 C 에서 제거 검토.
  # ─────────────────────────────────────────
  setup:
    name: Setup & Cache (legacy, container 잡에는 영향 없음)
    runs-on: ubuntu-latest
    needs: verify-builder
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

  # ─────────────────────────────────────────
  # 1. lint — (F-040 정정) 제거됨.
  #    책임: ci-quality-patch.yml 의 lint/typecheck/complexity/docstring/convention 5개 잡이 단독 담당.
  #    사유: black/ruff/mypy 가 두 워크플로 모두에서 동일 빌더 이미지로 실행되어 중복.
  #          제거로 PR 1건당 verify-builder 호출이 6→2회로 축소(러너 비용 + F-038 노출면 감소).
  # ─────────────────────────────────────────

  # ─────────────────────────────────────────
  # 2. secret-scan — Gitleaks (빌더 이미지 핀 버전 직접 호출)
  #    - PR/push 모두 차단(Critical).
  #    - 이력 + staged 변경 동시 스캔.
  #    - 라운드 B: gitleaks-action 제거 → 빌더에 핀된 gitleaks 바이너리 직접 사용.
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: [verify-builder, setup]
    timeout-minutes: 3
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=256m --cap-drop=ALL
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # 이력 전체 스캔에 필요. PR 라면 head/base 비교를 위해 fetch-depth=0.
          fetch-depth: 0
      - name: Gitleaks 실행 (빌더 핀 바이너리)
        run: |
          set -euo pipefail
          # .gitleaks.toml 존재 시 사용, 없으면 기본 룰.
          CONFIG_FLAG=""
          if [ -f .gitleaks.toml ]; then CONFIG_FLAG="--config=.gitleaks.toml"; fi
          gitleaks detect --no-banner --redact $CONFIG_FLAG \
            --report-format=sarif --report-path=/tmp/gitleaks.sarif \
            --exit-code=1
      - name: SARIF 업로드
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-sarif-${{ github.run_id }}
          path: /tmp/gitleaks.sarif
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────
  # 3. oscal-schema — trestle validate (빌더 이미지, 경고만)
  #    차단 정책은 compliance.yml 의 POAM 임계가 담당.
  # ─────────────────────────────────────────
  oscal-schema:
    name: OSCAL Schema Validate
    runs-on: ubuntu-latest
    needs: [verify-builder, setup]
    timeout-minutes: 3
    continue-on-error: true # CI 에서는 경고만. cd-prod 게이트가 차단.
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=256m --cap-drop=ALL
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # compliance-trestle / jsonschema 는 빌더 이미지에 핀 — pip install 단계 제거.
      - name: OSCAL 빌드
        run: python compliance/oscal/build_oscal.py compliance/oscal
      - name: trestle validate (5종)
        run: |
          set -e
          for f in \
            compliance/oscal/catalog/nist-ai-rmf-catalog.json \
            compliance/oscal/profile/uav-soc-ai-rmf-profile.json \
            compliance/oscal/component-definition/uav-soc-components.json \
            compliance/oscal/ssp/uav-soc-ssp.json \
            compliance/oscal/poam/uav-soc-poam.json
          do
            echo "::group::trestle validate $f"
            trestle validate -f "$f"
            echo "::endgroup::"
          done

  # ─────────────────────────────────────────
  # 4. test — pytest + coverage 임계 (빌더 이미지)
  # ─────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    # F-040 정정: lint 잡 제거로 의존 재배치. setup 캐시 + secret-scan 통과 후 test 실행.
    # lint(black/ruff/mypy) 책임은 ci-quality-patch.yml 의 lint/typecheck 잡으로 이전됨 — 두 워크플로가
    # 같은 PR 에 병렬 실행되며 lint 실패 시 PR 자체가 차단되므로 test 가 lint 를 needs 로 의존할 필요 없음.
    needs: [verify-builder, setup, secret-scan]
    timeout-minutes: 10
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      # test 는 임시 디렉터리에 coverage XML, junit 산출물을 써야 함 → /tmp tmpfs 크기 확대.
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=512m --cap-drop=ALL
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # pytest/pytest-cov/pytest-asyncio 는 빌더 이미지에 핀 — pip install 단계 제거.
      # 프로젝트 소스 자체는 editable install 없이 sys.path 로 import 되도록 pyproject 구성 가정.
      - name: 프로젝트 소스 import 경로 확인
        run: |
          # 빌더 이미지는 read-only — 가상환경에 editable install 불가.
          # pyproject.toml 의 ``[tool.pytest.ini_options].pythonpath`` 또는
          # tests/conftest.py 의 sys.path 추가로 import 해결 가정.
          python -c "import sys; sys.path.insert(0, '.'); import agents, core, tools" || \
            echo "::warning::루트 모듈 import 실패 — conftest.py sys.path 처리 확인 필요"
      - name: pytest + coverage (전체 80% / 핵심경로 90%)
        run: |
          # 핵심경로(agents/, core/)는 별도 임계로 강제(quality-gate 스킬 기준).
          pytest --tb=short \
            --cov=agents --cov=core --cov=tools --cov=app --cov=utils \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
          # 핵심경로 90% 별도 검증 — coverage report 의 모듈별 라인 사용.
          coverage report --include="agents/*,core/*" --fail-under=90
      - name: coverage 업로드 (artifact)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml-${{ github.run_id }}
          path: coverage.xml
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────
  # 5a. CodeQL — SAST (화이트리스트: 컨테이너 미적용)
  #     사유: github/codeql-action 은 자체 CodeQL CLI/Database 환경에 의존
  #          → 빌더 이미지 안에서 일관 동작 보장 어려움(공식 GitHub-hosted 권장).
  # ─────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: [verify-builder, setup]
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: CodeQL init
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          languages: python
          queries: security-extended
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          category: "/language:python"

  # ─────────────────────────────────────────
  # 5b. Semgrep — p/python p/security-audit (빌더 이미지)
  #     라운드 B: returntocorp/semgrep 외부 이미지 의존 제거 → 빌더 핀 사용.
  # ─────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: [verify-builder, setup]
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=256m --cap-drop=ALL
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Semgrep CI (High 차단)
        # 정책 위반(High↑) 시 비정상 종료. SARIF 산출은 /tmp 로 → tmpfs.
        run: |
          semgrep ci --config=p/python --config=p/security-audit \
            --sarif --output=/tmp/semgrep.sarif --error
        env:
          # Semgrep AppSec 미사용 — OSS 룰만 적용.
          SEMGREP_SEND_METRICS: "off"
      - name: SARIF 업로드 (코드 스캔 탭)
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: /tmp/semgrep.sarif
          category: semgrep

  # ─────────────────────────────────────────
  # 6a. dependency-review — PR 한정 (화이트리스트: 컨테이너 미적용)
  #     사유: actions/dependency-review-action 은 GitHub 메타데이터 API 직접 호출.
  #          빌더 컨테이너 안에서도 동작하지만 actions/* 공식 JS action 은 호스트 권장.
  # ─────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [verify-builder, setup]
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ─────────────────────────────────────────
  # 6b. pip-audit — SCA 보완 (빌더 이미지, High 차단)
  # ─────────────────────────────────────────
  pip-audit:
    name: pip-audit (SCA)
    runs-on: ubuntu-latest
    needs: [verify-builder, setup]
    timeout-minutes: 5
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=256m --cap-drop=ALL
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # pip-audit 는 빌더 이미지에 핀 — pip install 단계 제거.
      # 의존성 트리 audit: pyproject.toml 기반(editable install 없이 requirements 평가).
      - name: requirements 추출
        shell: bash
        run: |
          python - <<'PY' > /tmp/requirements.txt
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          proj = data.get('project', {})
          deps = list(proj.get('dependencies', []))
          deps += list(proj.get('optional-dependencies', {}).get('dev', []))
          print('\n'.join(deps))
          PY
      - name: pyproject 기반 audit
        shell: bash
        run: |
          pip-audit --strict --progress-spinner=off --disable-pip \
            -r /tmp/requirements.txt

  # ─────────────────────────────────────────
  # 7. build — docker buildx → GHCR (화이트리스트: 컨테이너 미적용)
  #    사유: 호스트 docker daemon 접근 필요(buildx). 컨테이너-in-컨테이너 회피.
  #    PR 빌드는 push=false (이미지 산출 검증만).
  #    push to develop/main 시 sha-<git-sha> 태그로 푸시.
  #    OIDC: id-token: write + packages: write (PAT 제거).
  # ─────────────────────────────────────────
  build:
    name: Build container (buildx + GHCR)
    runs-on: ubuntu-latest
    needs: [verify-builder, test, secret-scan]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write # GHCR push
      id-token: write # 향후 OIDC keyless 서명·attestation 연계 대비
    outputs:
      image_digest: ${{ steps.build-push.outputs.digest }}
      image_tag: ${{ steps.tags.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 태그 산출
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag_sha=${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: buildx 설치
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: GHCR 로그인 (GITHUB_TOKEN, OIDC 대체)
        # GITHUB_TOKEN + packages:write 로 PAT 제거. OIDC 토큰은 cosign 서명에서 사용.
        if: github.event_name == 'push'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & (push)
        id: build-push
        uses: docker/build-push-action@4f7cdeb0f1f2ac4233f0f24355a1838a86b54a9b # v6.10.0
        with:
          context: .
          file: deploy/Dockerfile
          # PR 은 검증만, push 만 실제 publish.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tag_sha }}
          cache-from: type=gha,scope=ci-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=ci-${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.licenses=Proprietary

  # ─────────────────────────────────────────
  # 8. container-scan — Trivy image (화이트리스트: 컨테이너 미적용)
  #    사유: aquasecurity/trivy-action 이 자체 도커 컨테이너로 실행 — 호스트 권장.
  #    Trivy 자체는 빌더 이미지에도 존재하지만 SARIF 업로드 액션 연동은 호스트 잡이 단순.
  # ─────────────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [verify-builder, build]
    if: github.event_name == 'push' # PR 은 push=false 라 스캔 대상 없음
    timeout-minutes: 7
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy DB 캐시
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
      - name: Trivy image scan (Critical 차단)
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.32.0
        with:
          image-ref: ${{ needs.build.outputs.image_tag }}
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # SARIF 업로드 위해 일단 통과 → 별도 step 에서 강제 차단
          ignore-unfixed: true
      - name: Trivy SARIF 업로드
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Critical 차단 게이트
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # v0.32.0
        with:
          image-ref: ${{ needs.build.outputs.image_tag }}
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

  # ─────────────────────────────────────────
  # 9. sbom — Syft SBOM 생성 → artifact (화이트리스트: 컨테이너 미적용)
  #    사유: anchore/sbom-action/download-syft 가 호스트에 syft 설치 — 컨테이너 안에서는
  #    빌더에 이미 핀된 syft 가 있으나 register/SARIF 연동은 호스트 잡이 단순.
  # ─────────────────────────────────────────
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    needs: [verify-builder, build]
    if: github.event_name == 'push'
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Syft 설치
        uses: anchore/sbom-action/download-syft@7b36ad622f042cab6f59a75c2ac24ccb256e9b45 # v0.20.4
      - name: SBOM 생성 (SPDX-JSON)
        run: |
          syft "${{ needs.build.outputs.image_tag }}" -o spdx-json=sbom.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-sha-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90
          if-no-files-found: error
