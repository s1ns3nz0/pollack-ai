    signals: ["UAVTelemetry_CL의 4개 센서군 이상 신호(GNSS/IMU: PosHorizVariance·VelocityVariance, 기압계: PosVertVariance, 지자기: CompassVariance, 에어스피드: Airspeed_ms/Groundspeed_ms 편차)를 union하여 동일 UAVId·10분 구간에 2개 이상 신호가 동시에 임계치를 초과하는 정황을 상관분석", "단일 센서 스텔스 드리프트(S9~S12)는 각각 낮은 임계값으로 개별 탐지가 어려우나, 다중 센서가 동시에 이상 징후를 보이면 EKF 센서퓨전 자체를 무력화하려는 협조 공격으로 판단"]
