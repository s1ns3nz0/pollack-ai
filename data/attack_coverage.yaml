# ── data_quality (DeTT&CT 방법론 — 선택, 점진적 채움) ─────────────────────────
# visibility(0~3): 로그원 자체의 정보 가치. 0=없음 1=최소(존재만 확인) 2=양호(맥락 있음)
#                  3=탁월(행위 재구성 가능).
# detection_maturity(0~4): 탐지 로직 성숙도. 0=없음 1=기초(단순 리터럴 임계)
#                  2=양호(동적 베이스라인) 3=매우양호(다중신호 상관) 4=탁월(운영검증+튜닝이력).
# log_source: 실제 근거 테이블(UAV*_CL). notes: 사각지대/특이사항 한 줄.
# 아래는 예시 채점(S1 GNSS 등 이미 실측된 룰 3건) — 신규 룰 저작 시 이 형식으로 추가.
data_quality:
  T0835:  # GNSS spoofing (S1) — dynamicPosGate P99 x1.5, zScore=3.0
    visibility: 3
    detection_maturity: 3
    log_source: UAVTelemetry_CL
    notes: "연속값 룰 — red 가 강도 낮추면 임계 이분탐색으로 회피 가능(구조적 한계)."
  T1692.001:  # 비인가 명령 주입 (weapon cmd 등) — 논리 확정형
    visibility: 2
    detection_maturity: 2
    log_source: UAVOperator_CL / UAVWeapon_CL
    notes: "categorical 룰 — 강도 조절로 회피 불가, TTP 전환만 우회 경로."
  T1195:  # 공급망(펌웨어/SBOM) 변조
    visibility: 1
    detection_maturity: 1
    log_source: "SBOM 컴포넌트 관측(수동 비교) — 실시간 스트림 아님"
    notes: "가시성 낮음 — 배포 시점 스냅샷 비교라 드웰타임 내 변조는 놓칠 수 있음."
