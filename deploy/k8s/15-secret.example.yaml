# ⚠️ 템플릿 — 실제 시크릿을 여기 커밋하지 말 것.
# 운영은 sealed-secrets / Azure Key Vault CSI / `kubectl create secret` 로 주입한다.
# 아래 값은 전부 자리표시자(REPLACE_ME)다.
apiVersion: v1
kind: Secret
metadata:
  name: soc-secrets
  namespace: dah-soc
type: Opaque
stringData:
  # RAGFlow API 토큰
  RAGFLOW_API_TOKEN: "REPLACE_ME"
  # Watch List PR 발행용 GitHub PAT
  GITHUB_TOKEN: "REPLACE_ME"
  # 외부 위협 인텔/샌드박스(선택 — 없으면 해당 어댑터 비활성)
  VIRUSTOTAL_API_KEY: "REPLACE_ME"
  ABUSEIPDB_API_KEY: "REPLACE_ME"
  HYBRIDANALYSIS_API_KEY: "REPLACE_ME"
  NVD_API_KEY: "REPLACE_ME"
  # 경험메모리 서명 HMAC 키(운영 시 Sha256Signer→HMAC 교체용)
  EXP_SIGNING_KEY: "REPLACE_ME"
