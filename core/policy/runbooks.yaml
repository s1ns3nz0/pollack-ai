  detection_rule: S1_GNSS_Spoofing.json
  playbook_id: playbook--uav-coll-0001
  tactic: Collection
  detail_level: curated
  evidence:
    required:
    - alert.signals
    - scenario.detection_rule
    optional:
    - alert.iocs
    - alert.mitre
    - alert.asset_id
  operator_steps:
  - id: validate_detection
    kind: manual
    action: S1_GNSS_Spoofing.json 알림의 signal·asset·time window가 S1-GNSS-SPOOFING 시나리오와 일치하는지 확인
  - id: execute_playbook_containment
    kind: manual
    action: playbook--uav-coll-0001의 contain 단계에 따라 Collection 대응 조치를 수행
  - id: verify_no_reoccurred
    kind: manual
    action: outcome_probe로 동일 지표 재발 여부를 관측하고 재발 시 축출/복구 단계를 반복
  approval:
    required: false
    reason: ''
  verification:
    method: outcome_probe
    expected: no_reoccurred
