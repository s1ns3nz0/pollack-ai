<!doctype html>
<html lang="ko" data-astryx-theme="neutral">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UAV AI SOC Defense Dashboard</title>
    <link rel="stylesheet" href="/static/vendor/astryx/reset.css" />
    <link rel="stylesheet" href="/static/vendor/astryx/astryx.css" />
    <link rel="stylesheet" href="/static/vendor/astryx/theme-neutral.css" />
    <link rel="stylesheet" href="/static/dashboard.css" />
    <link rel="stylesheet" href="/static/scenarios.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="app-header" aria-label="대시보드 헤더">
        <div>
          <div class="app-kicker">UAV AI SOC / Defense Operations</div>
          <h1>사이버 작전 참모 상황판</h1>
        </div>
        <div class="app-header-actions" aria-label="사이버방어태세">
          <span class="cpcon-badge" id="cpcon-badge">CPCON —</span>
        </div>
      </header>
      <header class="top-strip" id="top-strip" aria-label="상태 요약"></header>
      <section class="workbench">
        <aside
          class="story-rail"
          id="story-rail"
          aria-label="진행 중 story"
        ></aside>
        <section class="main-panel">
          <section class="navigator-panel">
            <div class="panel-title">UAV ATT&amp;CK 전술/기법 매트릭스</div>
            <div class="navigator-grid" id="navigator"></div>
          </section>
          <section
            class="bluf-card"
            id="bluf-card"
            aria-label="참모 조언"
          ></section>
        </section>
      </section>
      <section class="topology-panel">
        <div class="panel-title">UAS 자산 구성도</div>
        <div class="topology-map" id="topology-map"></div>
      </section>
      <footer class="replay-controls" id="replay-controls"></footer>
    </main>
    <script src="/static/dashboard.js" defer></script>
    <script src="/static/scenarios-data.js" defer></script>
    <script src="/static/scenarios-ui.js" defer></script>
  </body>
</html>
