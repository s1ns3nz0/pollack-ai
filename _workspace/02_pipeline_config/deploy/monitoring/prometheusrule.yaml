# =====================================================================
# PrometheusRule — UAV AI SOC 알림 규칙 (Alertmanager 라우팅).
#
# 6 그룹:
#   1) ci-cd-pipeline    — 빌드/배포/카나리/롤백
#   2) g2-regression     — test-engineer 의 G2 회귀 게이트
#   3) ai-redteam        — AI 레드팀 회귀·결정론·POAM 차단
#   4) oscal-compliance  — OSCAL 컴플라이언스 추세·POAM 임계
#   5) ai-soc-runtime    — 에이전트 레이턴시·LLM 비용·RAGAS·트리아지 정확도
#   6) supply-chain      — 무서명 이미지·SBOM 부재·SLSA 강등
#
# 라우팅:
#   - severity=critical → PagerDuty + Slack #ops-critical
#   - severity=warning  → Slack #ai-quality / #compliance / #security 분리
#   - severity=info     → Slack 로그 채널만
# 라벨 카디널리티 통제: ttp/atlas_id/framework/severity/track 만 노출,
# 사용자/세션/alert-id 라벨 금지.
# =====================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: soc-alerts
  namespace: dah-soc
  labels:
    release: kube-prometheus-stack # Prometheus 가 이 라벨로 PrometheusRule 선택
    prometheus: kube-prometheus
spec:
  groups:
    # ============================================================
    # 1) CI/CD 파이프라인
    # ============================================================
    - name: ci-cd-pipeline
      interval: 30s
      rules:
        - alert: CIBuildFailureRateHigh
          # GitHub Actions workflow_run → custom exporter 가 노출.
          # 1시간 윈도우 실패율 ≥ 10% (warning), ≥ 30% (critical).
          expr: |
            sum(rate(github_actions_workflow_run_total{conclusion="failure",workflow=~"ci.*"}[1h]))
              /
            sum(rate(github_actions_workflow_run_total{workflow=~"ci.*"}[1h])) >= 0.10
          for: 30m
          labels:
            severity: warning
            channel: ci
          annotations:
            summary: "CI 빌드 실패율 1시간 평균 ≥ 10%"
            description: "최근 1시간 CI 워크플로 실패율이 임계 10% 를 초과했습니다. 플레이키 테스트 또는 회귀 가능."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/ci-build-failure.md"

        - alert: CIBuildFailureRateCritical
          expr: |
            sum(rate(github_actions_workflow_run_total{conclusion="failure",workflow=~"ci.*"}[30m]))
              /
            sum(rate(github_actions_workflow_run_total{workflow=~"ci.*"}[30m])) >= 0.30
          for: 15m
          labels:
            severity: critical
            channel: ops-critical
          annotations:
            summary: "CI 빌드 실패율 30분 평균 ≥ 30%"
            description: "CI 파이프라인 광범위 장애 의심. 즉시 조사 필요."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/ci-build-failure.md"

        - alert: CDProdDeploymentFailed
          # cd-prod 워크플로 conclusion=failure 1건 이상.
          expr: |
            increase(github_actions_workflow_run_total{conclusion="failure",workflow="cd-prod"}[15m]) >= 1
          for: 0m
          labels:
            severity: critical
            channel: ops-critical
          annotations:
            summary: "cd-prod 배포 실패 발생"
            description: "main → production 배포 실패. 즉시 on-call 페이지."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/cd-prod-failure.md"

        - alert: CanaryRollbackOccurred
          # Argo Rollouts AnalysisRun phase=Failed → abort 트리거.
          expr: |
            increase(analysis_run_metric_phase{phase="Failed",rollout=~"soc-hotpath.*"}[10m]) >= 1
          for: 0m
          labels:
            severity: warning
            channel: deploy
          annotations:
            summary: "Argo Rollouts Canary 자동 롤백 발생"
            description: "{{ $labels.metric }} 메트릭 위반으로 hotpath 카나리가 abort 되었습니다."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/canary-rollback.md"

        - alert: DeploymentFrequencyDrop
          # DORA 배포 빈도 — 24h 0건이면 경고 (개발 정체 또는 게이트 정체).
          expr: |
            sum(increase(deployment_frequency_total{environment="production"}[24h])) < 1
          for: 6h
          labels:
            severity: warning
            channel: ci
          annotations:
            summary: "24시간 동안 prod 배포 0건"
            description: "DORA 배포 빈도 정체. 게이트 차단 또는 개발 지연 점검 필요."

        - alert: MTTRBudgetExceeded
          # incident open→close 시간 평균 > 1시간 (SLO 위반).
          expr: |
            avg_over_time(mean_time_to_restore_seconds{environment="production"}[1d]) > 3600
          for: 0m
          labels:
            severity: warning
            channel: ops-critical
          annotations:
            summary: "MTTR 1시간 SLO 위반"
            description: "어제 평균 MTTR 이 3600s 를 초과했습니다."

    # ============================================================
    # 2) G2 도메인 회귀 게이트 (test-engineer 합의)
    # ============================================================
    - name: g2-regression
      interval: 60s
      rules:
        - alert: G2GateCriticalFailure
          # critical 심각도 G2 실패 신규 발생.
          # (test-engineer §6 — g2_gate_fail_total{name,severity})
          expr: |
            increase(g2_gate_fail_total{severity="critical"}[15m]) >= 1
          for: 0m
          labels:
            severity: critical
            channel: ops-critical
          annotations:
            summary: "G2 critical 게이트 실패: {{ $labels.name }}"
            description: "도메인 회귀게이트 {{ $labels.name }} 가 critical 심각도로 실패. cd-prod 차단됨."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/g2-regression.md"

        - alert: G2GateHighFailure
          expr: |
            increase(g2_gate_fail_total{severity="high"}[1h]) >= 1
          for: 0m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "G2 high 게이트 실패: {{ $labels.name }}"
            description: "{{ $labels.name }} 게이트 high 위반. PR 머지 차단."

        - alert: G2RecallDegrading
          # KPI recall 추세 — gauge 가 0.85 미만 30분 연속.
          expr: |
            min_over_time(g2_gate_value{name="kpi_recall"}[30m]) < 0.85
          for: 30m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "G2 KPI recall 30분 평균 < 0.85"
            description: "탐지 누락 위험 — 모델/RAG 재튜닝 또는 룰 보강 필요."

        - alert: G2FPRecurrenceHigh
          expr: |
            max_over_time(g2_gate_value{name="fp_recurrence_rate"}[1h]) > 0.05
          for: 30m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "FP 재발률 5% 초과"
            description: "동일 false positive 재발률이 상한선을 넘었습니다."

    # ============================================================
    # 3) AI 레드팀 회귀·결정론·POAM 차단
    # ============================================================
    - name: ai-redteam
      interval: 60s
      rules:
        - alert: AIRedTeamRegressionDetected
          # ai-redteam-engineer §6 — 이전 통과 TTP 재실패. 즉시 페이지.
          expr: |
            increase(ai_redteam_regression_block_total[15m]) >= 1
          for: 0m
          labels:
            severity: critical
            channel: ops-critical
          annotations:
            summary: "AI 레드팀 회귀 감지 (이전 통과 TTP 재실패)"
            description: "결정론 회귀 감지. cd-prod 절대 차단. PyRIT/ATLAS 캠페인 즉시 재실행 권고."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/ai-redteam-regression.md"

        - alert: AIRedTeamDeterminismViolation
          # 동일 seed 2회 실행 → SHA-256 불일치 = 결정론 위반.
          expr: |
            increase(ai_redteam_determinism_check{result="fail"}[15m]) >= 1
          for: 0m
          labels:
            severity: critical
            channel: ops-critical
          annotations:
            summary: "AI 레드팀 결정론 위반"
            description: "동일 seed 로 두 번 실행한 ATLAS 결과 해시가 다릅니다. 모델 버전/temperature 점검 필요."

        - alert: AIRedTeamNewTTPFailure
          # ATLAS TTP 별 신규 실패 (시계열 증가). per-TTP 라벨 폭증 방지 위해
          # atlas_id 라벨만 허용 (5~10건 수준 카디널리티).
          expr: |
            increase(ai_redteam_ttp_fail_total[1h]) >= 1
          for: 0m
          labels:
            severity: warning
            channel: security
          annotations:
            summary: "AI 레드팀 TTP {{ $labels.atlas_id }} 실패"
            description: "{{ $labels.atlas_id }} ({{ $labels.owasp_llm }}) 캠페인 실패. POAM 자동 등록됨."

        - alert: GarakProbeFailRateHigh
          expr: |
            max_over_time(garak_probe_fail_rate[6h]) > 0.05
          for: 30m
          labels:
            severity: warning
            channel: security
          annotations:
            summary: "Garak probe {{ $labels.probe }} fail-rate > 5%"
            description: "프롬프트 인젝션/탈옥 방어 약화. 가드레일 보강 검토."

    # ============================================================
    # 4) OSCAL 컴플라이언스 추세·POAM 임계
    # ============================================================
    - name: oscal-compliance
      interval: 5m
      rules:
        - alert: OSCALPOAMCriticalOpen
          # critical 미해결 1건 이상 = 절대 차단 (방산).
          expr: |
            oscal_poam_open_total{severity="critical"} > 0
          for: 0m
          labels:
            severity: critical
            channel: compliance
          annotations:
            summary: "OSCAL POAM critical 미해결 {{ $value }}건"
            description: "main 배포 차단 트리거. critical 항목 즉시 해결 또는 risk-status 갱신 필요."
            runbook_url: "https://github.com/s1ns3nz0/pollack-ai/blob/main/docs/runbooks/oscal-poam-block.md"

        - alert: OSCALPOAMHighOver3
          expr: |
            oscal_poam_open_total{severity="high"} > 3
          for: 30m
          labels:
            severity: critical
            channel: compliance
          annotations:
            summary: "OSCAL POAM high 미해결 {{ $value }}건 (임계 3)"
            description: "방산 임계 위반. cd-prod 차단."

        - alert: OSCALComplianceRatioLow
          # implemented / total. 50% SLO, 40% 미만 경고.
          expr: |
            oscal_compliance_ratio < 0.40
          for: 1h
          labels:
            severity: warning
            channel: compliance
          annotations:
            summary: "OSCAL 컴플라이언스 비율 {{ $value | humanizePercentage }} < 40%"
            description: "구현 완료 통제 비중 하락. 거버넌스 검토."

        - alert: OSCALBuildStale
          # nightly CronJob 으로 24h 마다 갱신되어야 함. 36h 지나면 경고.
          expr: |
            time() - oscal_last_build_timestamp > 129600
          for: 0m
          labels:
            severity: warning
            channel: compliance
          annotations:
            summary: "OSCAL 산출물 36시간 이상 미갱신"
            description: "nightly OSCAL CronJob 동작 확인 필요."

    # ============================================================
    # 5) AI-SOC 런타임 (에이전트/LLM/RAGAS/트리아지)
    # ============================================================
    - name: ai-soc-runtime
      interval: 30s
      rules:
        - alert: HotpathAgentLatencyP99High
          # AnalysisTemplate 와 동일한 쿼리 — 트랙 A SLO.
          expr: |
            histogram_quantile(0.99,
              sum by (le) (rate(agent_latency_seconds_bucket{track="hotpath"}[5m]))
            ) > 5
          for: 5m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "hotpath agent_latency p99 > 5초 5분 연속"
            description: "AnalysisTemplate 와 동일 임계. 카나리 abort 직전 상태."

        - alert: TriageMTTTHigh
          # 트리아지 평균 시간 30초 SLO.
          expr: |
            histogram_quantile(0.99, sum by (le) (rate(mttt_seconds_bucket{track="hotpath"}[10m]))) > 30
          for: 10m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "트리아지 처리 시간 P99 > 30초 SLO 위반"

        - alert: LLMCostBurstHigh
          # llm_cost_usd_total 1시간 증가가 평소 대비 2배 — 예산 급증.
          expr: |
            sum(rate(llm_cost_usd_total[1h])) /
            sum(rate(llm_cost_usd_total[1h] offset 24h)) > 2
          for: 30m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "LLM 비용 1h 증가율 24h 평균의 2배"
            description: "모델별 토큰 폭증 점검. 비용 알람."

        - alert: RAGASFaithfulnessLow
          # SLO — 일 평균 ≥ 0.85, 5분 평균 < 0.80 = warning.
          expr: |
            avg_over_time(ragas_faithfulness_score[5m]) < 0.80
          for: 5m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "RAGAS faithfulness 5분 평균 < 0.80"
            description: "RAG 응답 신뢰도 저하. 인덱스 품질/프롬프트 튜닝 검토."

        - alert: RAGASRelevancyLow
          expr: |
            avg_over_time(ragas_relevancy_score[5m]) < 0.80
          for: 5m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "RAGAS relevancy 5분 평균 < 0.80"

        - alert: TriageAccuracyRegress
          # triage_accuracy_ratio 1시간 평균 하락 — 추세 알림.
          expr: |
            avg_over_time(triage_accuracy_ratio[1h]) < 0.85
          for: 30m
          labels:
            severity: warning
            channel: ai-quality
          annotations:
            summary: "triage_accuracy_ratio 1h 평균 < 0.85"
            description: "트리아지 정확도 추세 하락. 모델/룰 검토."

        - alert: HotpathAvailabilitySLO
          # 가용성 99.5% SLO — 5xx 비율 ≥ 0.5% 1시간 누적.
          expr: |
            sum(rate(http_requests_total{job="soc-hotpath",code=~"5.."}[1h]))
              /
            sum(rate(http_requests_total{job="soc-hotpath"}[1h])) > 0.005
          for: 30m
          labels:
            severity: warning
            channel: ops-critical
          annotations:
            summary: "hotpath 가용성 SLO 위반 (5xx > 0.5%)"

    # ============================================================
    # 6) 공급망 무결성
    # ============================================================
    - name: supply-chain
      interval: 60s
      rules:
        - alert: UnsignedImageDeployAttempt
          # Kyverno verifyImages 정책 차단 카운터.
          expr: |
            increase(supply_chain_unsigned_image_total[15m]) >= 1
          for: 0m
          labels:
            severity: critical
            channel: security
          annotations:
            summary: "무서명 이미지 배포 시도 차단"
            description: "Kyverno verifyImages 가 cosign 미서명 이미지를 차단했습니다."

        - alert: SBOMMissingHigh
          expr: |
            supply_chain_sbom_missing_total > 0
          for: 30m
          labels:
            severity: warning
            channel: security
          annotations:
            summary: "SBOM 미첨부 이미지 {{ $value }}건"

        - alert: SLSAProvenanceDowngrade
          # 0/1/2/3 gauge — 3 → 2 강등 시 즉시 경고.
          expr: |
            slsa_provenance_level < 2
          for: 0m
          labels:
            severity: critical
            channel: security
          annotations:
            summary: "SLSA Provenance 레벨 {{ $value }} (목표 ≥ 2)"
            description: "공급망 무결성 강등. release-signing 워크플로 점검."
