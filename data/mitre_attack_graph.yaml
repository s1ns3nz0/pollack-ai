  T0856: { name: "Spoof Reporting Message", framework: "ATT&CK ICS" }
  T0831: { name: "Manipulation of Control", framework: "ATT&CK ICS" }
  T0815: { name: "Denial of View", framework: "ATT&CK ICS" }
