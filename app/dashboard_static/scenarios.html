<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UAV AI SOC — 시나리오 라이브 (A·B·C)</title>
<style>
  :root{
    --bg:#0b0f14; --surface:#131a22; --panel:#0f151c; --ring:#1e2a36;
    --ink:#e6edf3; --ink2:#9fb0c0; --muted:#66788a;
    --atk:#e5556b; --goal:#e5c455; --step:#8aa0b4; --soc:#38bdf8; --ok:#22c55e;
    --grid:#1a2430;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#12202c 0,var(--bg) 60%);
    color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.5;min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 72px}
  header .kicker{color:var(--soc);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
  header h1{font-size:24px;margin:4px 0 6px}
  header .lede{color:var(--ink2);margin:0;font-size:14px}
  .badge{display:inline-block;background:var(--surface);border:1px solid var(--ring);border-radius:999px;
    padding:3px 11px;font-size:11.5px;color:var(--ink2);margin-top:8px}
  .badge b{color:var(--goal)}

  /* 시나리오 탭 */
  .tabs{display:flex;gap:8px;margin:22px 0 4px;flex-wrap:wrap}
  .tab{background:var(--surface);border:1px solid var(--ring);border-radius:10px;padding:10px 16px;
    cursor:pointer;color:var(--ink2);font:inherit;text-align:left;transition:.15s}
  .tab:hover{border-color:#2c3d4d}
  .tab[aria-selected=true]{border-color:var(--soc);color:var(--ink);background:#0f1c26}
  .tab .t-id{font-weight:800;color:var(--soc);font-size:13px;letter-spacing:.08em}
  .tab .t-name{font-size:13px;display:block;margin-top:2px}
  .tab .t-sec{font-size:11px;color:var(--muted)}

  .panel{background:var(--panel);border:1px solid var(--ring);border-radius:14px;padding:22px;margin-top:14px}
  .scn-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .scn-head h2{margin:0;font-size:19px}
  .scn-head .sec{color:var(--muted);font-size:12px;margin-top:2px}
  .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0 4px}
  .meta .m{background:var(--surface);border:1px solid var(--ring);border-radius:10px;padding:12px 14px}
  .meta .m .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .meta .m .val{font-size:13.5px;margin-top:4px;color:var(--ink)}

  /* 자산 순회 맵 */
  .map-title{display:flex;align-items:center;gap:10px;margin:22px 0 10px}
  .map-title h3{margin:0;font-size:14px;color:var(--ink2)}
  .controls{margin-left:auto;display:flex;gap:8px}
  .btn{font:inherit;border-radius:10px;padding:9px 16px;cursor:pointer;border:1px solid var(--ring);
    background:var(--surface);color:var(--ink);transition:.15s}
  .btn:hover{border-color:#2c3d4d}
  .btn:focus-visible{outline:2px solid var(--soc);outline-offset:2px}
  .btn-run{background:linear-gradient(180deg,#123243,#0e2634);border-color:var(--soc);color:#dff3ff;font-weight:700}
  .btn-run[disabled]{opacity:.5;cursor:default;border-color:var(--ring)}
  .btn-ghost{color:var(--ink2)}

  .flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 2px 12px}
  .node{position:relative;min-width:150px;flex:0 0 auto;background:var(--surface);border:1px solid var(--ring);
    border-radius:12px;padding:12px 14px;opacity:.5;transition:.35s}
  .node.on{opacity:1;border-color:var(--soc);box-shadow:0 0 0 1px var(--soc),0 8px 26px -12px rgba(56,189,248,.6)}
  .node.atk{border-left:3px solid var(--atk)} .node.atk.on{border-color:var(--atk);box-shadow:0 0 0 1px var(--atk),0 8px 26px -12px rgba(229,85,107,.6)}
  .node.goal.on{border-color:var(--goal);box-shadow:0 0 0 1px var(--goal),0 8px 30px -10px rgba(229,196,85,.7);animation:pulseGoal 1.4s ease}
  .node .n-label{font-weight:700;font-size:13.5px}
  .node .n-sub{color:var(--muted);font-size:11.5px;margin-top:3px}
  .node .n-kind{position:absolute;top:8px;right:10px;font-size:10px;letter-spacing:.06em;text-transform:uppercase}
  .node.atk .n-kind{color:var(--atk)} .node.goal .n-kind{color:var(--goal)} .node.asset .n-kind{color:var(--muted)}
  .edge{flex:0 0 auto;min-width:118px;display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:0 6px;position:relative}
  .edge .line{width:100%;height:2px;background:var(--grid);position:relative;border-radius:2px}
  .edge.on .line{background:linear-gradient(90deg,var(--soc),var(--atk))}
  .edge .line .pulse{position:absolute;top:-3px;left:0;width:8px;height:8px;border-radius:50%;background:var(--atk);
    opacity:0;box-shadow:0 0 10px 2px var(--atk)}
  .edge.on .line .pulse{animation:travel 1s ease forwards}
  .edge .tech{font-size:11px;color:var(--ink2);text-align:center;margin-bottom:6px;min-height:28px}
  .edge.on .tech{color:var(--ink)}
  .edge .arrow{color:var(--muted);font-size:12px;margin-top:5px}
  .edge.on .arrow{color:var(--atk)}

  @keyframes travel{from{left:0;opacity:1}to{left:calc(100% - 8px);opacity:1}}
  @keyframes pulseGoal{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}

  /* 진행바 */
  .progress{height:6px;background:var(--grid);border-radius:6px;margin:6px 0 20px;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--soc),var(--atk));transition:width .4s ease}

  /* 스텝 카드 */
  .steps{display:grid;gap:10px}
  .step{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:14px 16px;
    opacity:.45;transform:translateY(4px);transition:.35s}
  .step.on{opacity:1;transform:none;border-color:#2c3d4d}
  .step.done{opacity:.8}
  .step .s-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .step .s-n{background:#0f1c26;border:1px solid var(--soc);color:var(--soc);font-weight:800;border-radius:8px;
    width:30px;height:30px;display:grid;place-items:center;font-size:13px;flex:0 0 auto}
  .step.crit .s-n{border-color:var(--goal);color:var(--goal);background:#241f0e}
  .step .s-tactic{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .step .s-tech{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--soc);
    background:#0f1c26;border:1px solid var(--ring);border-radius:6px;padding:2px 8px}
  .step.crit .s-tech{color:var(--goal);background:#241f0e}
  .step .s-action{margin:8px 0 0;font-size:13.5px}
  .step .s-signal{margin:6px 0 0;font-size:12px;color:var(--ink2)}
  .step .s-signal code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;
    background:var(--panel);border:1px solid var(--ring);border-radius:5px;padding:1px 6px}

  /* 종착 배너 */
  .terminal{margin-top:16px;border:1px solid var(--goal);background:linear-gradient(180deg,#241f0e,#171307);
    border-radius:12px;padding:14px 16px;opacity:0;max-height:0;overflow:hidden;transition:.5s}
  .terminal.on{opacity:1;max-height:200px;padding:14px 16px}
  .terminal .t-lab{color:var(--goal);font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
  .terminal .t-txt{margin:6px 0 0;font-size:14px}

  .f3ead{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;align-items:center}
  .f3ead .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .f3ead .chip{background:var(--surface);border:1px solid var(--ring);border-radius:999px;padding:3px 11px;font-size:12px;color:var(--ink2)}

  footer{color:var(--muted);font-size:11.5px;margin-top:26px;border-top:1px solid var(--grid);padding-top:14px}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">UAV AI SOC · Defense Operations</div>
    <h1>공격 시나리오 라이브 — A · B · C</h1>
    <p class="lede">보고서 §4.4~4.6의 세 킬체인을 자산 순회로 재생한다. <b>시나리오 테스트</b>를 누르면 ATT&amp;CK 단계가 종착 효과까지 자동 진행된다.</p>
    <span class="badge"><b>DEMO</b> · 보고서 시나리오 매핑 · 결정론 재생(실 트래픽 아님)</span>
  </header>

  <div class="tabs" role="tablist" aria-label="시나리오 선택" id="tabs"></div>

  <div class="panel" role="tabpanel" id="panel"></div>

  <footer>
    UAV AI SOC 시나리오 플레이어 · 자기완결(오프라인) · 시나리오 정의는 보고서 §4.4(A)·§4.5(B)·§4.6(C) 기준.
    ATT&amp;CK-ICS/Enterprise 기법 라벨은 보고서 킬체인 표와 일치.
  </footer>
</div>

<script>
"use strict";
const SCENARIOS = [
  {
    id:"A", name:"UAV 제어권 탈취", section:"보고서 §4.4",
    mission:"기체 파괴 없이 비행 제어권만 원격 강탈. 실속·추락 없이 조종권 장악 시점에서 정지.",
    surface:"C2 링크 평면(물리·논리). MAVLink2 서명 미적용 또는 세션키 노출 전제.",
    terminal:"운용자 조종권 상실 · 공격자 기동 장악. 기체는 비행 유지, 파괴 없음.",
    f3ead:["Find 링크 도달","Fix 세션 하이재킹","Finish 제어권 전환"],
    nodes:[
      {label:"공격자",kind:"atk",sub:"external"},
      {label:"datalink-los",kind:"asset",sub:"mavlink-router · TCP 5790"},
      {label:"av-mpd",kind:"asset",sub:"ArduPilot FCC"},
      {label:"비행 제어권",kind:"goal",sub:"control ownership"},
    ],
    edges:[
      {step:"①",tactic:"명령·제어(C2)",tech:"T1071",crit:false,
       action:"C2 애플리케이션 프로토콜 세션을 하이재킹해 통제 채널 장악",
       signal:"UAVDatalinkConn_CL — LocalPort=5790 · PeerIp∉known"},
      {step:"②",tactic:"공정제어저해",tech:"T0855",crit:true,
       action:"무허가 명령으로 비행 모드를 GUIDED로 강제, 통제 전환",
       signal:"UAVOperator_CL — SourceSystemId∉{1,254,255} · Command=176(GUIDED)"},
      {step:"③",tactic:"임팩트",tech:"T0827 · T0831",crit:false,
       action:"제어 권한을 운용자에서 공격자로 전환(Loss/Manipulation of Control)",
       signal:"UAVTelemetry_CL — CustomMode 델타 · 조종권 상실"},
    ],
  },
  {
    id:"B", name:"ISR 영상 노이즈·변조", section:"보고서 §4.5",
    mission:"EO/IR·ISR 영상에 노이즈·위조 프레임 주입해 상황인식 오염. 기체 제어는 미개입.",
    surface:"지상 SW 평면 + ISR 수집 평면. 함대관리 API 인증우회(IDOR), RTSP 미암호·핀닝 부재 전제.",
    terminal:"운용자 화면 시야 조작(T0832) · 표적 오인. 기체는 정상 비행.",
    f3ead:["Find API 노출 식별","Fix 인증우회 진입","Finish 영상 스트림 변조"],
    nodes:[
      {label:"공격자",kind:"atk",sub:"external"},
      {label:"fleet / pgse API",kind:"asset",sub:"지상 SW · REST"},
      {label:"telemetry bus",kind:"asset",sub:"UAV*_CL · ISR 메타데이터"},
      {label:"EO/IR RTSP",kind:"asset",sub:"영상 스트림"},
      {label:"GCS / QGC 화면",kind:"goal",sub:"운용자 시야"},
    ],
    edges:[
      {step:"①",tactic:"초기침투",tech:"T1190",crit:false,
       action:"함대관리 API 인증우회(IDOR)로 시스템 진입",
       signal:"pgse REST — 객체 단위 권한검사 부재 · 식별자 열거"},
      {step:"②",tactic:"임팩트(데이터)",tech:"T1565.001",crit:true,
       action:"텔레메트리 버스에 위조 데이터 저장·주입, 무결성 붕괴",
       signal:"UAV*_CL — producer identity/서명 없는 위조 좌표·타임스탬프"},
      {step:"③",tactic:"정보수집",tech:"T1557",crit:false,
       action:"EO/IR RTSP 스트림 중간자 하이재킹, 노이즈·위조 프레임 주입",
       signal:"RTSP — 미암호/핀닝 부재 · 프레임 시퀀스 불일치"},
      {step:"종착",tactic:"임무영향",tech:"T0832",crit:true,
       action:"운용자 화면 시야 조작(Manipulation of View) — 표적 오인 유발",
       signal:"원본 텔레메트리 vs GCS 표시값 불일치"},
    ],
  },
  {
    id:"C", name:"ISR 영상·데이터 유출", section:"보고서 §4.6",
    mission:"GCS를 발판으로 링크·저장소 암호키와 SAR 표적좌표·정찰 데이터 반출. 노리는 것은 기체가 아니라 기체가 모은 것.",
    surface:"ISR 수집 평면 + 사이버 페르소나. 약한 자격증명·MFA 미적용, 접근제어 미흡 저장소 전제.",
    terminal:"암호키·SAR 표적좌표 유출 · 정찰 성과물·향후 통신 기밀성 상실.",
    f3ead:["Find GCS 식별","Fix 자격 탈취","Finish 유출","Exploit 탈취 키로 후속 복호"],
    nodes:[
      {label:"공격자",kind:"atk",sub:"external"},
      {label:"auth-stub / GCS 세션",kind:"asset",sub:"운용자 계정"},
      {label:"ISR 저장소",kind:"asset",sub:"키 · SAR · 정찰 산출물"},
      {label:"외부 C2 / 후속 복호",kind:"goal",sub:"exfil"},
    ],
    edges:[
      {step:"①",tactic:"초기침투·권한상승",tech:"T1078",crit:false,
       action:"GCS 자격 브루트포스로 정규 계정·고권한 획득(MFA 미적용)",
       signal:"auth 로그 — 반복 실패 후 성공 · 신규 위치 세션"},
      {step:"②",tactic:"자료유출(키 탈취)",tech:"T1041",crit:true,
       action:"링크·저장소 암호키 탈취 — 향후 복호·재사용 확보",
       signal:"동일 세션 연속 민감 객체 접근(키·SAR·영상)"},
      {step:"③",tactic:"자료유출·임팩트",tech:"T1041 · T1565",crit:false,
       action:"SAR 표적좌표·정찰 데이터를 C2 채널로 반출",
       signal:"outbound — 정상 웹/C2 위장 전송 · 접근 직후 egress"},
    ],
  },
];

let current = 0, timer = null, running = false;

function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

function renderTabs(){
  const t = document.getElementById("tabs"); t.innerHTML="";
  SCENARIOS.forEach((s,i)=>{
    const b = el("button","tab");
    b.setAttribute("role","tab"); b.setAttribute("aria-selected", i===current);
    b.innerHTML = `<span class="t-id">시나리오 ${s.id}</span><span class="t-name">${s.name}</span><span class="t-sec">${s.section}</span>`;
    b.onclick = ()=>{ stop(); current=i; render(); };
    t.appendChild(b);
  });
}

function render(){
  renderTabs();
  const s = SCENARIOS[current];
  const p = document.getElementById("panel");
  const nodesHtml = s.nodes.map((n,i)=>{
    let h = `<div class="node ${n.kind}" data-node="${i}"><span class="n-kind">${n.kind==="atk"?"공격자":n.kind==="goal"?"목표":"자산"}</span>`
      + `<div class="n-label">${n.label}</div><div class="n-sub">${n.sub}</div></div>`;
    if(i < s.edges.length){
      const e = s.edges[i];
      h += `<div class="edge" data-edge="${i}"><div class="tech">${e.tech}</div>`
        + `<div class="line"><span class="pulse"></span></div><div class="arrow">▶</div></div>`;
    }
    return h;
  }).join("");
  const stepsHtml = s.edges.map((e,i)=>
    `<div class="step ${e.crit?'crit':''}" data-step="${i}"><div class="s-top">`
    + `<span class="s-n">${e.step}</span><span class="s-tactic">${e.tactic}</span>`
    + `<span class="s-tech">${e.tech}</span></div>`
    + `<p class="s-action">${e.action}</p>`
    + `<p class="s-signal">관측 신호 · <code>${e.signal}</code></p></div>`
  ).join("");
  p.innerHTML =
    `<div class="scn-head"><div><h2>시나리오 ${s.id} · ${s.name}</h2><div class="sec">${s.section}</div></div>`
    + `<div class="controls"><button class="btn btn-run" id="run">▶ 시나리오 테스트</button>`
    + `<button class="btn btn-ghost" id="reset">초기화</button></div></div>`
    + `<div class="meta">`
    + `<div class="m"><div class="lab">임무</div><div class="val">${s.mission}</div></div>`
    + `<div class="m"><div class="lab">공격표면</div><div class="val">${s.surface}</div></div>`
    + `<div class="m"><div class="lab">종착 효과</div><div class="val">${s.terminal}</div></div></div>`
    + `<div class="map-title"><h3>자산 순회 — 킬체인</h3></div>`
    + `<div class="progress"><i id="prog"></i></div>`
    + `<div class="flow" id="flow">${nodesHtml}</div>`
    + `<div class="steps" id="steps">${stepsHtml}</div>`
    + `<div class="terminal" id="terminal"><div class="t-lab">종착 효과</div><div class="t-txt">${s.terminal}</div></div>`
    + `<div class="f3ead"><span class="lab">F3EAD</span>` + s.f3ead.map(x=>`<span class="chip">${x}</span>`).join("") + `</div>`;
  document.getElementById("run").onclick = run;
  document.getElementById("reset").onclick = ()=>{ stop(); clearActive(); };
  clearActive();
}

function clearActive(){
  document.querySelectorAll(".node,.edge,.step").forEach(x=>x.classList.remove("on","done"));
  const t=document.getElementById("terminal"); if(t)t.classList.remove("on");
  const pr=document.getElementById("prog"); if(pr)pr.style.width="0";
  const btn=document.getElementById("run"); if(btn){btn.disabled=false; btn.textContent="▶ 시나리오 테스트";}
}

function stop(){ if(timer){clearTimeout(timer);timer=null;} running=false; }

function run(){
  if(running) return;
  clearActive();
  running=true;
  const s = SCENARIOS[current];
  const n = s.edges.length;
  const btn = document.getElementById("run"); btn.disabled=true; btn.textContent="진행 중…";
  const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  const gap = reduce ? 350 : 1400;
  document.querySelector('.node[data-node="0"]').classList.add("on");
  let i = 0;
  const advance = ()=>{
    if(i>=n){
      document.getElementById("terminal").classList.add("on");
      btn.disabled=false; btn.textContent="↻ 다시 재생"; running=false; return;
    }
    document.querySelector(`.edge[data-edge="${i}"]`).classList.add("on");
    document.querySelector(`.node[data-node="${i+1}"]`).classList.add("on");
    const st = document.querySelector(`.step[data-step="${i}"]`);
    st.classList.add("on");
    document.querySelectorAll(".step").forEach((x,j)=>{ if(j<i) x.classList.add("done"); });
    document.getElementById("prog").style.width = `${((i+1)/n)*100}%`;
    i++;
    timer = setTimeout(advance, gap);
  };
  timer = setTimeout(advance, reduce?150:600);
}

render();
</script>
</body>
</html>
