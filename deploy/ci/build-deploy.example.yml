# 참고용 — CD 워크플로(트랙 A: 워크로드).
# 채택 시 `.github/workflows/cd.yml` 로 복사. CI 게이트(lint/test/CodeQL)는 기존
# ci.yml 이 담당하고, 여기서는 결정론 G2 게이트 → 이미지 build/push → 태그 bump 까지.
#
# 필요 시크릿(GitHub Actions Secrets):
#   GHCR_PAT          : 컨테이너 레지스트리 push 토큰
#   (ArgoCD 는 git 을 폴링하므로 별도 배포 자격 불필요 — 태그 bump 커밋만 push)
name: CD (build & GitOps bump)

on:
  push:
    branches: [main]

permissions:
  contents: write # deploy/k8s 태그 bump 커밋 push

jobs:
  # ── G2 회귀게이트 — 통과 못 하면 배포 차단 ──
  gate:
    name: G2 Regression Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: 결정론 benchmark(FP-재발률 + ATLAS)
        run: |
          python benchmarks/run_fp_recurrence.py
          python benchmarks/run_atlas_redteam.py
      - name: 게이트 임계 검증
        # check_gates.py 는 결과 JSON 을 파싱해 임계를 강제(미구현 — benchmarks-ci.md
        # 의 표 기준으로 작성). 미구현 동안은 위 benchmark 의 비정상 종료로 대체.
        run: python benchmarks/check_gates.py

  # ── 이미지 build/push + GitOps 태그 bump ──
  build-deploy:
    name: Build image & bump tag
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & push (불변 태그 = git SHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ghcr.io/s1ns3nz0/uav-ai-soc:${{ github.sha }}

      - name: deploy/k8s 이미지 태그 bump (선언적 진실 갱신)
        run: |
          sed -i "s|uav-ai-soc:[^\"]*|uav-ai-soc:${{ github.sha }}|g" \
            deploy/k8s/30-deployment-a-hotpath.yaml \
            deploy/k8s/40-deployment-b-learning.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git commit -am "ci: bump image to ${{ github.sha }}" || echo "no change"
          git push
      # → ArgoCD 가 이 커밋을 감지해 dah-soc 워크로드를 자동 동기화(롤아웃).
