# 모니터링 스택 — Prometheus Operator + Prometheus + Grafana + Alertmanager(helm).
# sync-wave 0: CRD(ServiceMonitor 등)를 먼저 설치해야 soc-monitoring 이 적용된다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dah-soc
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        grafana:
          sidecar:
            dashboards:
              enabled: true # grafana_dashboard 라벨 ConfigMap 자동 적재
              searchNamespace: ALL
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # 대형 CRD 적용
