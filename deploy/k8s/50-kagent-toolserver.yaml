# (선택) kagent CRD — 운영용 MCP 도구를 kagent 로 등록.
# ADR 0002 D6: 핵심 SOC 는 AKS 네이티브 배포(kagent CRD 비종속)지만, 운영/알림/관측
# 계열 MCP 도구는 kagent 가 관리할 수 있다(핫패스 in-process 도구는 그대로 둠).
# ⚠️ 설치된 kagent 버전의 CRD 스키마에 맞춰 apiVersion/spec 을 검증할 것.
apiVersion: kagent.dev/v1alpha1
kind: RemoteMCPServer
metadata:
  name: soc-ops-tools
  namespace: dah-soc
spec:
  description: "UAV SOC 운영 MCP — Watch List PR 발행/알림/관측(핫패스 외)"
  protocol: STREAMABLE_HTTP
  url: "http://soc-learning.dah-soc.svc.cluster.local:80/mcp"
  timeout: 30s
