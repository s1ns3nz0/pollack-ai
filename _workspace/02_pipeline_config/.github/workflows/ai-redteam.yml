# =====================================================================
# ai-redteam.yml — AI/LLM 적대 레드팀 캠페인 워크플로
#
# 대상: SOC 에이전트·LLM·RAG·LangGraph 상태·경험메모리.
#       (워크플로 컴플라이언스 레드팀은 devsecops-redteam 의 몫 — 분리)
#
# 이중 트랙:
#   트랙 A (결정론 게이트, 매 PR/main, 차단)
#     - run_atlas_redteam.py        : T0020/T0051/T0015 (LLM 불요)
#     - run_redteam_skeleton.py     : 심각도 하향 차단율
#     - ai_redteam_to_poam.py       : 실패 → OSCAL POAM 산출
#     - check_poam_thresholds.py    : POAM 임계 강제
#
#   트랙 B (라이브 캠페인, nightly/release, 비차단 추세 + 회귀 차단)
#     - PyRIT 오케스트레이터 (Azure OpenAI 평가 대상)
#     - Garak probe (promptinject, dan, latentinjection)
#     - 결과 → POAM 머지 PR (ci-bot)
#
# 트리거 매트릭스:
#   PR  → 카나리 캠페인 (5분 캡, 경고)
#   develop push → 중간 캠페인 (15분 캡, 경고)
#   main push    → 전체 캠페인 (30분 캡, 차단)
#   nightly      → 풀 캠페인 + 신규 TTP 탐색 + POAM PR
#   workflow_dispatch → 수동 (시나리오 선택)
#
# 차단 정책:
#   - 회귀(regression): 이전 main 통과 TTP 재실패 = 즉시 차단 (모든 트리거)
#   - 신규 실패율: main 한정 차단 (PR/develop = 경고만)
#   - 결정론 위반(동일 seed, 동일 모델 → 다른 결과): 즉시 차단
#
# 보안:
#   - 모든 third-party action SHA 핀 (release-signing.yml 과 동일 스타일)
#   - PyRIT/Garak 외부 LLM 호출은 Azure Managed Identity (OIDC) 우선
#   - 라이브 캠페인은 staging 타깃 전용 — production 미타격 절대 원칙
#   - 비용 캡: max_iterations + timeout-minutes + token 예산
#
# 라운드 B (옵션 1, 빌더 이미지 핀):
#   - 적용: resolve-mode, atlas-deterministic, domain-scenarios
#   - 화이트리스트(컨테이너 외부):
#       pyrit-campaign   — azure/login + az CLI 의존
#       garak-campaign   — azure/login + REST 인증 의존
#       report-and-poam  — peter-evans/create-pull-request 호스트 git config 의존
# =====================================================================

name: AI Red Team

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "agents/**"
      - "core/**"
      - "tools/**"
      - "prompts/**"
      - "benchmarks/**"
      - "compliance/oscal/**"
      - ".github/workflows/ai-redteam.yml"
  push:
    branches: [main, develop]
  schedule:
    # 매일 17:00 UTC = 02:00 KST (nightly 풀 캠페인)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "캠페인 모드"
        type: choice
        default: "canary"
        options: [canary, mid, full, live]
      seed:
        description: "결정론 seed (기본 42)"
        type: string
        default: "42"

permissions:
  contents: read

# 동일 PR/브랜치는 in-progress 캠페인을 취소해 비용·시간 캡 유지
concurrency:
  group: ai-redteam-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  # 결정론 게이트 — 모든 캠페인에 동일 seed 강제
  REDTEAM_SEED: ${{ inputs.seed || '42' }}
  # PyRIT 비용 캡 (CLAUDE.md Settings.max_pyrit_iterations 참고)
  MAX_PYRIT_ITER: "50"
  # POAM 산출물 경로 — security-scanner check_poam_thresholds.py 와 합의
  POAM_FRAGMENT: benchmarks/results/ai_redteam_poam.json
  PREVIOUS_PASS_PATH: benchmarks/results/previous_pass.json

jobs:
  # ─────────────────────────────────────────────────────────────────
  # -1) verify-builder — 빌더 이미지 cosign 서명 검증(공급망 게이트)
  # ─────────────────────────────────────────────────────────────────
  verify-builder:
    name: Verify builder image (cosign keyless)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      packages: read
    steps:
      - uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1
      - name: BUILDER_IMAGE_DIGEST 존재 검증
        run: |
          if [ -z "${{ vars.BUILDER_IMAGE_DIGEST }}" ]; then
            echo "::error::vars.BUILDER_IMAGE_DIGEST 미설정 — build-builder.yml 부트스트랩 필요."
            exit 1
          fi
      - name: cosign verify (uav-soc-builder)
        run: |
          cosign verify \
            --certificate-identity-regexp '^https://github\.com/s1ns3nz0/pollack-ai/\.github/workflows/build-builder\.yml@refs/heads/main$' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}

  # ─────────────────────────────────────────────────────────────────
  # 0) 모드 결정 + 이전 main 통과 이력 다운로드 (회귀 게이트 입력) — 빌더 이미지
  # ─────────────────────────────────────────────────────────────────
  resolve-mode:
    name: 캠페인 모드 결정 + 이전 통과 이력 로드
    runs-on: ubuntu-latest
    needs: verify-builder
    timeout-minutes: 3
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=64m --cap-drop=ALL
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      timeout: ${{ steps.mode.outputs.timeout }}
      block: ${{ steps.mode.outputs.block }}
    steps:
      - name: 모드 매핑
        id: mode
        run: |
          set -euo pipefail
          # 트리거 → (mode, timeout, block) 매트릭스
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="live"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            MODE="canary"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            MODE="full"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            MODE="mid"
          else
            MODE="canary"
          fi
          case "$MODE" in
            canary) TIMEOUT=5;  BLOCK="warn"  ;;
            mid)    TIMEOUT=15; BLOCK="warn"  ;;
            full)   TIMEOUT=30; BLOCK="block" ;;
            live)   TIMEOUT=45; BLOCK="warn"  ;;
            *)      TIMEOUT=10; BLOCK="warn"  ;;
          esac
          {
            echo "mode=$MODE"
            echo "timeout=$TIMEOUT"
            echo "block=$BLOCK"
          } >> "$GITHUB_OUTPUT"
          echo "[모드] $MODE / timeout=${TIMEOUT}m / 정책=${BLOCK}"

  # ─────────────────────────────────────────────────────────────────
  # 1) 트랙 A — 결정론 ATLAS 캠페인 (LLM 불요, 매 트리거 실행) — 빌더 이미지
  # ─────────────────────────────────────────────────────────────────
  atlas-deterministic:
    name: ATLAS 결정론 캠페인 (T0020/T0051/T0015)
    needs: [verify-builder, resolve-mode]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=512m --cap-drop=ALL
    outputs:
      result-key: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 라운드 B: pytest/python 의존성은 빌더 이미지에 핀 — setup-python + pip install 단계 제거.

      - name: 이전 main 통과 이력 다운로드 (회귀 게이트 입력)
        # 라운드 A-2 F-017 정정: actions/download-artifact 는 같은 run 의 artifact 만 받음.
        # 이전 main run 의 ai-redteam-passing-ttps 를 받기 위해 dawidd6/action-download-artifact 사용.
        # SHA 검증: curl -s https://api.github.com/repos/dawidd6/action-download-artifact/git/refs/tags/v6
        #   → bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 (v6 lightweight tag → commit)
        id: prev
        continue-on-error: true
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: ai-redteam.yml
          branch: main
          name: ai-redteam-passing-ttps
          path: benchmarks/results
          if_no_artifact_found: warn
          # 가장 최근 main 캠페인 산출물 다운로드 (없으면 빈 디렉터리)

      - name: ATLAS 결정론 캠페인 실행
        env:
          PYTHONHASHSEED: ${{ env.REDTEAM_SEED }}
        run: |
          set -euo pipefail
          python benchmarks/run_atlas_redteam.py

      - name: 심각도 하향 차단율 측정 (run_redteam_skeleton)
        env:
          PYTHONHASHSEED: ${{ env.REDTEAM_SEED }}
        run: |
          set -euo pipefail
          python benchmarks/run_redteam_skeleton.py || true
          # 시나리오 YAML 부재 시 결과가 없을 수 있어 후속 단계에서 처리

      - name: 결정론 회귀 확인 (같은 seed → 같은 결과)
        env:
          PYTHONHASHSEED: ${{ env.REDTEAM_SEED }}
        run: |
          set -euo pipefail
          # 1차 결과를 보존 → 2차 실행 후 SHA-256 비교.
          cp benchmarks/results/atlas_redteam.json benchmarks/results/atlas_run1.json
          python benchmarks/run_atlas_redteam.py
          H1=$(python -c "import hashlib; print(hashlib.sha256(open('benchmarks/results/atlas_run1.json','rb').read()).hexdigest())")
          H2=$(python -c "import hashlib; print(hashlib.sha256(open('benchmarks/results/atlas_redteam.json','rb').read()).hexdigest())")
          echo "run1=$H1"
          echo "run2=$H2"
          if [ "$H1" != "$H2" ]; then
            echo "::error::결정론 위반 — 동일 seed/입력에서 다른 결과가 산출됨. 즉시 차단."
            exit 1
          fi
          echo "결정론 OK ($H1)"

      - name: AI 레드팀 결과 → OSCAL POAM 변환
        id: to-poam
        run: |
          set -euo pipefail
          mkdir -p benchmarks/results
          # 회귀 게이트 입력 — 이전 통과 TTP 목록이 있으면 사용
          PREV_FLAG=""
          if [ -f "${{ env.PREVIOUS_PASS_PATH }}" ]; then
            PREV_FLAG="--previous-pass ${{ env.PREVIOUS_PASS_PATH }}"
          fi
          # main 모드에서만 --fail-on-new (차단)
          FAIL_FLAG=""
          if [ "${{ needs.resolve-mode.outputs.block }}" = "block" ]; then
            FAIL_FLAG="--fail-on-new"
          else
            FAIL_FLAG="--warn-only"
          fi
          python scripts/ai_redteam_to_poam.py \
            --atlas-result benchmarks/results/atlas_redteam.json \
            --redteam-result benchmarks/results/redteam_results.json \
            $PREV_FLAG \
            --out ${{ env.POAM_FRAGMENT }} \
            $FAIL_FLAG

      - name: 통과 TTP 목록 산출 (다음 회귀 게이트 입력)
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, pathlib
          atlas = json.loads(pathlib.Path("benchmarks/results/atlas_redteam.json").read_text())
          # 통과 = (T0020 robust==0) AND (T0051 attack==0).
          # T0015 는 추적이므로 통과 집합에 포함하지 않음(고정 한계).
          passing = []
          for r in atlas["results"]:
              tech = str(r.get("technique", ""))
              if not tech.startswith("AML."):
                  continue
              ttp = tech.split()[0]
              robust = r.get("robust_success_rate")
              attack = r.get("attack_success_rate")
              if ttp == "AML.T0020" and robust == 0.0:
                  passing.append(ttp)
              if ttp == "AML.T0051" and attack == 0.0:
                  passing.append(ttp)
          pathlib.Path("benchmarks/results/passing_ttps.json").write_text(
              json.dumps({"passing_ttps": passing}, ensure_ascii=False, indent=2)
          )
          print("passing:", passing)
          PY

      - name: 결과 artifact 업로드
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-atlas-${{ github.run_id }}
          path: benchmarks/results/*.json
          retention-days: 90
          if-no-files-found: error

      - name: main 통과 시 차세대 회귀 입력으로 보존
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-passing-ttps
          path: benchmarks/results/passing_ttps.json
          retention-days: 365
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # 2) 트랙 B-1 — PyRIT 캠페인 (라이브, nightly/dispatch 한정)
  #
  # 화이트리스트 사유(F-039 정정):
  #   - Azure OIDC 로그인(azure/login@v2.2.0) + az CLI 가 필요. 빌더 이미지는 현재 az CLI 미포함.
  #   - 옵션 A(빌더에 az CLI 포함) 미채택 — 빌더 크기 ~500MB 증가 + apt repo/GPG key 추가로
  #     부트스트랩 복잡도 상승. 운영 안정화 후 마이그레이션 검토.
  #   - 옵션 B 채택: 호스트 setup-python 의 patch 버전을 정확 핀(3.11.10) + pip/wheel/setuptools 도
  #     빌더와 동일 버전(24.2/0.44.0/74.1.2)으로 핀 → 의존성 해소 재현성 확보.
  #   - pip install -e ".[dev]" 는 빌더가 `pip install`을 컨테이너 안에서 수행하는 패키지와
  #     동일한 lock(pyproject.toml dev extras) — 결과 의존성 트리 동일.
  # ─────────────────────────────────────────────────────────────────
  pyrit-campaign:
    name: PyRIT 라이브 캠페인 (staging 타깃)
    needs: [verify-builder, resolve-mode, atlas-deterministic]
    if: needs.resolve-mode.outputs.mode == 'live' || needs.resolve-mode.outputs.mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write   # Azure OIDC (Managed Identity) — 라이브 LLM 호출용
      contents: read
    environment: redteam-staging   # 보호 규칙: production 미타격 강제
    steps:
      - name: 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Python 셋업 (F-039 정정 — 빌더 이미지와 동일 patch 버전)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # 빌더 이미지의 python:3.11-slim-bookworm patch 버전과 정확 일치(재현성).
          # 빌더 갱신 시 본 핀도 함께 갱신 — Dockerfile.builder 의 베이스 디지스트 PR 에 포함.
          python-version: "3.11.10"
          cache: pip

      - name: 의존성 + PyRIT 설치 (F-039 정정 — 빌더와 부트스트랩 도구 핀 동일)
        run: |
          set -euo pipefail
          # 빌더 이미지의 Dockerfile.builder L73 핀과 동일 — 부트스트랩 도구 결정성 확보.
          python -m pip install "pip==24.2" "wheel==0.44.0" "setuptools==74.1.2"
          # 프로젝트 dev extras — pyproject.toml 단일 lock. 빌더 이미지는 같은 extras 를
          # 별도 venv 에 설치하나 본 잡은 호스트 venv(setup-python 캐시) — 결과 의존성 동일.
          pip install -e ".[dev]"
          # PyRIT 자체는 빌더 이미지에 핀되지 않은 의존성 — 호스트 설치 유지.
          pip install "pyrit==0.6.*" || pip install "pyrit"
          # 의존성 트리 추적성 확보 — 빌더 이미지와 diff 비교 가능.
          pip freeze > /tmp/pyrit_pip_freeze.txt

      - name: Azure OIDC 로그인 (staging 전용 Managed Identity)
        # 02_infra_config.md §8 SHA 표 정합 — cd-prod.yml 과 동일 v2.2.0 통일.
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_REDTEAM_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: PyRIT 캠페인 실행 (objective × scenario 매트릭스)
        env:
          PYTHONHASHSEED: ${{ env.REDTEAM_SEED }}
          PYRIT_TARGET_BASE_URL: ${{ secrets.PYRIT_STAGING_TARGET_URL }}
          PYRIT_MAX_ITER: ${{ env.MAX_PYRIT_ITER }}
        run: |
          set -euo pipefail
          mkdir -p benchmarks/results
          # 결정론 — seed/모델 버전 고정 + 토큰 예산 캡.
          # 실제 PyRIT 오케스트레이션은 benchmarks/run_redteam_skeleton.py 의
          # RedTeamTarget 어댑터를 사용 (CLAUDE.md 의 PyRITConnectionError 처리 포함).
          python - <<'PY' || EXIT=$?
          import asyncio, json, os, pathlib, sys
          sys.path.insert(0, ".")
          try:
              from benchmarks.run_redteam_skeleton import pyrit_garak_integration_stub
              # 실 캠페인 어댑터가 구현되면 여기서 호출. 미구현 시 NotImplemented.
              pyrit_garak_integration_stub()
          except NotImplementedError:
              # 어댑터 미연결 — 라이브 캠페인 스킵하고 결과 placeholder 작성.
              pathlib.Path("benchmarks/results/pyrit_report.json").write_text(
                  json.dumps({"scenarios": [], "note": "PyRIT adapter not yet connected"}, indent=2)
              )
              print("[INFO] PyRIT 어댑터 미연결 — placeholder 산출")
          PY
          # 이 잡은 비차단 (warn-only) — 어댑터 미구현이라도 게이트 통과.

      - name: PyRIT 결과 artifact 업로드
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-pyrit-${{ github.run_id }}
          path: benchmarks/results/pyrit_report.json
          retention-days: 90
          if-no-files-found: warn

      - name: pip freeze 추적성 업로드 (F-039 정합)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-pyrit-pipfreeze-${{ github.run_id }}
          path: /tmp/pyrit_pip_freeze.txt
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # 3) 트랙 B-2 — Garak probe (라이브, nightly/full)
  #
  # 화이트리스트 사유(F-039 정정):
  #   - Azure 환경 변수 + REST 인증 시크릿 의존(staging endpoint).
  #   - 옵션 A(빌더에 az CLI 포함) 미채택. 옵션 B 채택 — 호스트 setup-python 정확 핀 + 부트스트랩 도구 동기.
  #   - Garak 자체는 빌더 이미지에 미핀(별도 의존성 — RAG 평가 도구) — 호스트 설치 유지.
  # ─────────────────────────────────────────────────────────────────
  garak-campaign:
    name: Garak probe (promptinject/dan/latentinjection)
    needs: [verify-builder, resolve-mode, atlas-deterministic]
    if: needs.resolve-mode.outputs.mode == 'live' || needs.resolve-mode.outputs.mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: read
    environment: redteam-staging
    steps:
      - name: 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Python 셋업 (F-039 정정 — 빌더 이미지와 동일 patch 버전)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # 빌더 이미지(python:3.11-slim-bookworm)와 정확 일치(재현성).
          python-version: "3.11.10"
          cache: pip

      - name: Garak 설치 (F-039 정정 — 부트스트랩 도구 핀 동기)
        run: |
          set -euo pipefail
          # 빌더 이미지의 Dockerfile.builder L73 핀과 동일.
          python -m pip install "pip==24.2" "wheel==0.44.0" "setuptools==74.1.2"
          pip install "garak==0.10.*" || pip install "garak"
          pip freeze > /tmp/garak_pip_freeze.txt

      - name: Garak probe 실행 (rest 타깃)
        env:
          GARAK_TARGET_URL: ${{ secrets.GARAK_STAGING_TARGET_URL }}
          GARAK_API_KEY: ${{ secrets.GARAK_STAGING_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p benchmarks/results
          # 비용 캡 — probe 3종 한정, generations 최소화.
          garak \
            --model_type rest \
            --model_name "$GARAK_TARGET_URL" \
            --probes promptinject,dan,latentinjection \
            --generations 5 \
            --report_prefix benchmarks/results/garak \
            --narrow_output \
          || echo "[WARN] Garak run errored — placeholder 산출"
          # Garak 0.10+ 는 garak.report.json 으로 산출
          if [ -f benchmarks/results/garak.report.json ]; then
            mv benchmarks/results/garak.report.json benchmarks/results/garak_report.json
          else
            echo '{"probes": [], "note": "garak run failed or no output"}' > benchmarks/results/garak_report.json
          fi

      - name: Garak 결과 artifact 업로드
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-garak-${{ github.run_id }}
          path: benchmarks/results/garak_report.json
          retention-days: 90
          if-no-files-found: warn

      - name: pip freeze 추적성 업로드 (F-039 정합)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-garak-pipfreeze-${{ github.run_id }}
          path: /tmp/garak_pip_freeze.txt
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # 4) 도메인 시나리오 (UAV SOC 특화 시나리오 YAML 기반) — 빌더 이미지
  # ─────────────────────────────────────────────────────────────────
  domain-scenarios:
    name: 도메인 시나리오 캠페인 (S1~S11)
    needs: [verify-builder, resolve-mode, atlas-deterministic]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(needs.resolve-mode.outputs.timeout) }}
    container:
      image: ghcr.io/s1ns3nz0/uav-soc-builder@${{ vars.BUILDER_IMAGE_DIGEST }}
      options: --user 10001 --read-only --tmpfs /tmp:rw,nosuid,nodev,size=512m --cap-drop=ALL
    steps:
      - name: 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # 라운드 B: pytest/python 의존성은 빌더에 핀 — setup-python + pip install 단계 제거.

      - name: 도메인 시나리오 캠페인 실행
        env:
          PYTHONHASHSEED: ${{ env.REDTEAM_SEED }}
        run: |
          set -euo pipefail
          # run_redteam_skeleton 가 projects/dah2026/scenarios/S*.yaml 를 자동 로드
          python benchmarks/run_redteam_skeleton.py

      - name: 도메인 결과 artifact 업로드
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-domain-${{ github.run_id }}
          path: benchmarks/results/redteam_results.json
          retention-days: 90
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # 5) 종합 게이트 + POAM 머지 + (nightly 한정) PR 자동 생성
  #
  # 화이트리스트 사유(F-039 정정):
  #   - peter-evans/create-pull-request 가 호스트 git config(actions/checkout 의 origin 인증 토큰)에
  #     의존 — 컨테이너 안에서는 GITHUB_TOKEN remote URL 주입 동작이 불완전.
  #   - 옵션 A 미채택 / 옵션 B 채택 — 호스트 setup-python 의 patch 버전을 빌더 이미지와 정확 일치 핀.
  #   - 의존성 트리는 pyproject.toml dev extras 단일 lock → 빌더와 동일 의존성 해소.
  # ─────────────────────────────────────────────────────────────────
  report-and-poam:
    name: 종합 게이트 + POAM 자동 머지
    needs: [verify-builder, resolve-mode, atlas-deterministic, domain-scenarios]
    if: always() && needs.atlas-deterministic.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # nightly POAM 머지 PR 자동 생성용
      pull-requests: write
      id-token: read
    steps:
      - name: 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Python 셋업 (F-039 정정 — 빌더 이미지와 동일 patch 버전)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # 빌더 이미지(python:3.11-slim-bookworm)와 정확 일치(재현성).
          python-version: "3.11.10"
          cache: pip

      - name: 의존성 설치 (F-039 정정 — 부트스트랩 도구 핀 동기)
        run: |
          set -euo pipefail
          # 빌더 이미지의 Dockerfile.builder L73 핀과 동일 — 결정성 확보.
          python -m pip install "pip==24.2" "wheel==0.44.0" "setuptools==74.1.2"
          # pyproject.toml dev extras — 빌더 이미지와 동일 lock.
          pip install -e ".[dev]"
          pip freeze > /tmp/report_pip_freeze.txt

      - name: 모든 캠페인 결과 통합 다운로드
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: benchmarks/results
          merge-multiple: true

      - name: 이전 통과 이력 다운로드 (회귀 게이트 입력)
        # 라운드 A-2 F-017 정정: 이전 main run 의 artifact 는 dawidd6/action-download-artifact 로 수신.
        continue-on-error: true
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: ai-redteam.yml
          branch: main
          name: ai-redteam-passing-ttps
          path: benchmarks/results
          if_no_artifact_found: warn

      - name: 통합 POAM 산출
        id: poam
        run: |
          set -euo pipefail
          PREV_FLAG=""
          if [ -f "${{ env.PREVIOUS_PASS_PATH }}" ] || [ -f "benchmarks/results/passing_ttps.json" ]; then
            PREV_FLAG="--previous-pass benchmarks/results/passing_ttps.json"
          fi
          FAIL_FLAG="--warn-only"
          if [ "${{ needs.resolve-mode.outputs.block }}" = "block" ]; then
            FAIL_FLAG="--fail-on-new"
          fi
          GARAK_FLAG=""
          if [ -f "benchmarks/results/garak_report.json" ]; then
            GARAK_FLAG="--garak-result benchmarks/results/garak_report.json"
          fi
          PYRIT_FLAG=""
          if [ -f "benchmarks/results/pyrit_report.json" ]; then
            PYRIT_FLAG="--pyrit-result benchmarks/results/pyrit_report.json"
          fi
          python scripts/ai_redteam_to_poam.py \
            --atlas-result benchmarks/results/atlas_redteam.json \
            --redteam-result benchmarks/results/redteam_results.json \
            $GARAK_FLAG $PYRIT_FLAG $PREV_FLAG \
            --out ${{ env.POAM_FRAGMENT }} \
            $FAIL_FLAG

      - name: 기존 POAM 머지 + 임계 검증 (security-scanner check_poam_thresholds.py)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # 라운드 A-2 정정: 스크립트 경로를 정식 위치로 일괄 변경.
        #   scripts/ai_redteam_to_poam.py
        #   compliance/oscal/check_poam_thresholds.py
        # check_poam_thresholds.py 인자 형식도 F-001 과 동일 (--mode block + --partial-warn).
        run: |
          set -euo pipefail
          python scripts/ai_redteam_to_poam.py \
            --atlas-result benchmarks/results/atlas_redteam.json \
            --redteam-result benchmarks/results/redteam_results.json \
            --previous-pass benchmarks/results/passing_ttps.json \
            --out ${{ env.POAM_FRAGMENT }} \
            --append-to-poam compliance/oscal/poam/uav-soc-poam.json \
            --fail-on-new
          # OSCAL POAM 임계 강제 — main 차단
          python compliance/oscal/check_poam_thresholds.py \
            compliance/oscal/poam/uav-soc-poam.json \
            --critical-max 0 --high-max 3 \
            --partial-warn 25 \
            --mode block \
            --report-md _workspace/04d_ai_redteam_poam_report.md \
            --report-json benchmarks/results/poam_summary.json

      - name: 종합 POAM 산출물 업로드
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-poam-${{ github.run_id }}
          path: |
            ${{ env.POAM_FRAGMENT }}
            benchmarks/results/poam_summary.json
            _workspace/04d_ai_redteam_poam_report.md
          retention-days: 365
          if-no-files-found: warn

      - name: pip freeze 추적성 업로드 (F-039 정합)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-redteam-report-pipfreeze-${{ github.run_id }}
          path: /tmp/report_pip_freeze.txt
          retention-days: 30
          if-no-files-found: warn

      - name: AI 레드팀 메트릭 → Pushgateway (F-008)
        # 산출물:
        #   ai_redteam_ttp_fail_total{atlas_id,owasp_llm}
        #   ai_redteam_determinism_check{result} 1   (pass/fail)
        #   ai_redteam_regression_block_total        (이전 통과 TTP 재실패 시)
        #   garak_probe_fail_rate{probe}             (garak_report.json 의 fail rate)
        # vars.PUSHGATEWAY_URL 미설정 시 잡 건너뜀.
        if: always() && vars.PUSHGATEWAY_URL != ''
        env:
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
          RUN_ID: ${{ github.run_id }}
          MODE: ${{ needs.resolve-mode.outputs.mode }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request

          results = pathlib.Path('benchmarks/results')
          lines: list[str] = []

          # 1) ATLAS 결과 → TTP 실패 카운터
          atlas_path = results / 'atlas_redteam.json'
          if atlas_path.exists():
              atlas = json.loads(atlas_path.read_text())
              for row in atlas.get('results', []):
                  tech = str(row.get('technique', ''))
                  if not tech.startswith('AML.'):
                      continue
                  ttp = tech.split()[0]
                  robust = row.get('robust_success_rate', 0.0) or 0.0
                  attack = row.get('attack_success_rate', 0.0) or 0.0
                  if (ttp == 'AML.T0020' and robust > 0.0) or (
                      ttp == 'AML.T0051' and attack > 0.0
                  ):
                      # OWASP LLM 매핑은 ai_redteam_to_poam 의 매핑과 동기화 필요.
                      owasp = {
                          'AML.T0020': 'LLM01',
                          'AML.T0051': 'LLM01',
                          'AML.T0015': 'LLM02',
                      }.get(ttp, 'unknown')
                      lines.append(
                          f'ai_redteam_ttp_fail_total{{atlas_id="{ttp}",'
                          f'owasp_llm="{owasp}"}} 1'
                      )

          # 2) 결정론 검증 — atlas_run1.json 과 atlas_redteam.json 의 SHA-256 동일성
          run1 = results / 'atlas_run1.json'
          run2 = results / 'atlas_redteam.json'
          if run1.exists() and run2.exists():
              import hashlib

              h1 = hashlib.sha256(run1.read_bytes()).hexdigest()
              h2 = hashlib.sha256(run2.read_bytes()).hexdigest()
              det = 'pass' if h1 == h2 else 'fail'
              lines.append(f'ai_redteam_determinism_check{{result="{det}"}} 1')

          # 3) 회귀 차단 카운터 — passing_ttps.json 대비 신규 실패
          passing_path = results / 'passing_ttps.json'
          if passing_path.exists() and atlas_path.exists():
              prev = set(
                  json.loads(passing_path.read_text()).get('passing_ttps', [])
              )
              regression_count = 0
              for row in json.loads(atlas_path.read_text()).get('results', []):
                  tech = str(row.get('technique', ''))
                  if not tech.startswith('AML.'):
                      continue
                  ttp = tech.split()[0]
                  robust = row.get('robust_success_rate', 0.0) or 0.0
                  attack = row.get('attack_success_rate', 0.0) or 0.0
                  failed_now = (ttp == 'AML.T0020' and robust > 0.0) or (
                      ttp == 'AML.T0051' and attack > 0.0
                  )
                  if failed_now and ttp in prev:
                      regression_count += 1
              lines.append(
                  f'ai_redteam_regression_block_total {regression_count}'
              )

          # 4) Garak probe fail rate
          garak_path = results / 'garak_report.json'
          if garak_path.exists():
              try:
                  garak = json.loads(garak_path.read_text())
                  for probe in garak.get('probes', []):
                      name = probe.get('name', 'unknown')
                      fail_rate = probe.get('fail_rate')
                      if fail_rate is not None:
                          lines.append(
                              f'garak_probe_fail_rate{{probe="{name}"}} {fail_rate}'
                          )
              except json.JSONDecodeError:
                  print('[WARN] garak_report.json 파싱 실패 — skip')

          if not lines:
              print('[INFO] push 대상 메트릭 0건')
              raise SystemExit(0)
          body = ('\n'.join(lines) + '\n').encode('utf-8')
          url = (
              f"{os.environ['PUSHGATEWAY_URL']}"
              f"/metrics/job/ai-redteam/instance/{os.environ['RUN_ID']}"
          )
          req = urllib.request.Request(url, data=body, method='POST')
          with urllib.request.urlopen(req, timeout=10) as resp:
              print(f'[OK] Pushgateway status={resp.status} push={len(lines)}')
          PY

      - name: nightly — POAM 자동 갱신 PR 생성
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@6d6857d36972b65feb161a90e484f2984215f83e # v6.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci-bot/ai-redteam-poam-${{ github.run_id }}
          title: "chore(oscal): AI 레드팀 결과 POAM 자동 갱신 (run ${{ github.run_id }})"
          commit-message: |
            chore(oscal): AI 레드팀 nightly POAM 갱신

            - 산출 워크플로: ai-redteam.yml run ${{ github.run_id }}
            - 입력: atlas_redteam.json, redteam_results.json, pyrit/garak (있을 시)
            - 회귀 차단 정책: 이전 main 통과 TTP 재실패 시 critical 으로 승격
          body: |
            ## AI 레드팀 nightly POAM 자동 갱신

            - 워크플로: `ai-redteam.yml` run ${{ github.run_id }}
            - 산출 스크립트: `scripts/ai_redteam_to_poam.py`
            - POAM 임계 검증: `compliance/oscal/check_poam_thresholds.py`

            ### 매핑
            - MITRE ATLAS TTP → OSCAL POAM Item ``props[name=atlas-ttp]``
            - OWASP LLM Top10 → ``props[name=owasp-llm]``
            - NIST AI RMF 통제 → ``props[name=ai-rmf-controls]`` (MEASURE 2.7/2.6/3.2, MAP 4.2, GOVERN 4.3)

            ### 검토 가이드
            - [ ] 신규 POAM Item 의 ATLAS TTP/매핑이 정확한가
            - [ ] 회귀(`props[regression]=true`) 항목의 원인 분석 티켓 생성 여부
            - [ ] 머지 후 `cd-prod.yml` 게이트 통과 가능 여부
          labels: |
            oscal
            ai-redteam
            ci-bot
          delete-branch: true
