# MITRE TTP 지식그래프 씨앗 — GraphRAG 결정론 검색용.
#
# 출처: docs/hackathon/README.md 팀 시나리오↔MITRE 매핑(S1~S6) + repo AnalyticsRules.
# 이 표는 본질적으로 그래프다: 시나리오 -uses-> 기법 -under-> 전술,
# 기법 -detected_by-> 룰, 시나리오 -mitigated_by-> 플레이북, 시나리오 -targets-> 자산.
# LLM 추출 없이 큐레이션된 그래프를 그대로 검색한다(결정론·무환각).

techniques:
