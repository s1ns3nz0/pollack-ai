      action--recover-verify:
        type: action
        name: "복구 검증 — 제어 변조 재발 관측"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "outcome_probe 재발 관측 — 재변조 시 자율 페일세이프 + 운용자 수동 인계" }
        labels: { phase: recover, verify: true, nist_ir: "IR-6", source_ref: "recovery:ImpairProcessControl:verify" }
        on_completion: "action--adapt"
      action--adapt:
        type: action
        name: "적응 — 제어 명령 인증 강화"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "제어 명령 서명·논스 검증 강화, 파라미터 변경 이력 무결성 로깅(Non-Persistence)" }
        labels: { phase: adapt, nist_ir: "IR-8", resiliency_technique: "SubstantiatedIntegrity" }
        external_references:
          - { source_name: "nist-800-160v2", external_id: "SubstantiatedIntegrity", url: "https://csrc.nist.gov/pubs/sp/800/160/v2/r1/final", description: "Cyber Resiliency" }
        on_completion: "end--0"
      end--0:
        type: end

