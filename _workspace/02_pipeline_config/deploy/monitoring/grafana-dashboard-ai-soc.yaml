# Grafana AI-SOC Operations Dashboard — 에이전트 레이턴시/LLM 비용/RAGAS/트리아지.
# 트랙 A(hotpath) 저지연 + 트랙 B(learning) 비동기를 한 화면에 표시.
apiVersion: v1
kind: ConfigMap
metadata:
  name: soc-grafana-dashboard-ai-soc
  namespace: dah-soc
  labels:
    grafana_dashboard: "1"
data:
  uav-soc-ai-ops.json: |
    {
      "title": "UAV AI SOC — AI Operations",
      "uid": "uav-soc-ai-ops",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["uav", "soc", "ai", "llm", "ragas"],
      "templating": {
        "list": [
          {"name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": {}},
          {"name": "track", "type": "custom", "query": "hotpath,learning,toolserver", "current": {"text": "hotpath", "value": "hotpath"}}
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Agent Latency P99 by Phase ({{track}})",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "fieldConfig": {"defaults": {"unit": "s",
            "thresholds": {"mode": "absolute",
              "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 2}, {"color": "red", "value": 5}]}}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "histogram_quantile(0.99, sum by (le, phase, agent) (rate(agent_latency_seconds_bucket{track=\"$track\"}[5m])))",
             "legendFormat": "{{agent}}.{{phase}} p99"}
          ]
        },
        {
          "id": 2,
          "title": "MTTT (트리아지 평균 시간) P50/P95/P99",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(mttt_seconds_bucket{track=\"$track\"}[10m])))", "legendFormat": "P50"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(mttt_seconds_bucket{track=\"$track\"}[10m])))", "legendFormat": "P95"},
            {"expr": "histogram_quantile(0.99, sum by (le) (rate(mttt_seconds_bucket{track=\"$track\"}[10m])))", "legendFormat": "P99"}
          ]
        },
        {
          "id": 3,
          "title": "LLM Tokens (in/out) by model",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "sum by (model, direction) (rate(llm_tokens_total[5m]))",
             "legendFormat": "{{model}} {{direction}}"}
          ]
        },
        {
          "id": 4,
          "title": "LLM Cost (USD/h) by model",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "fieldConfig": {"defaults": {"unit": "currencyUSD"}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "sum by (model) (rate(llm_cost_usd_total[1h])) * 3600", "legendFormat": "{{model}}"}
          ]
        },
        {
          "id": 5,
          "title": "Triage Accuracy Ratio by Severity",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 16},
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1,
            "thresholds": {"mode": "absolute",
              "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.80}, {"color": "green", "value": 0.85}]}}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "avg by (severity) (triage_accuracy_ratio)", "legendFormat": "{{severity}}"}
          ]
        },
        {
          "id": 6,
          "title": "RAGAS Faithfulness (component)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 16},
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1,
            "thresholds": {"mode": "absolute",
              "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.75}, {"color": "green", "value": 0.85}]}}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "avg by (component) (ragas_faithfulness_score)", "legendFormat": "{{component}}"}
          ]
        },
        {
          "id": 7,
          "title": "RAGAS Relevancy (component)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 16},
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1,
            "thresholds": {"mode": "absolute",
              "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.80}, {"color": "green", "value": 0.85}]}}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "avg by (component) (ragas_relevancy_score)", "legendFormat": "{{component}}"}
          ]
        },
        {
          "id": 8,
          "title": "Verdict 비율 (TP/FP/IR/Esc) — 추세",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "sum by (verdict) (rate(soc_verdict_total[5m]))", "legendFormat": "{{verdict}}"}
          ]
        },
        {
          "id": 9,
          "title": "5xx 비율 (트랙 A SLO 99.5%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "fieldConfig": {"defaults": {"unit": "percentunit", "max": 0.02,
            "thresholds": {"mode": "absolute",
              "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.005}, {"color": "red", "value": 0.01}]}}},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {"expr": "sum(rate(http_requests_total{job=\"soc-hotpath\",code=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"soc-hotpath\"}[5m]))",
             "legendFormat": "5xx rate"}
          ]
        }
      ]
    }
