# UAV ATT&CK 커버리지 매트릭스 — 전술별 탐지상태 + 갭 archetype.
#
# 출처: 팀 「UAV ATT&CK 매핑표 (Enterprise+ICS)」. status: covered(✅)/planned(🔜)/
# uncovered(❌). uncovered 는 archetype(A~E)와 대응전략을 함께 보유한다.
# tools/coverage.py 가 이 파일로 커버리지 KPI·갭 분류·인접추론을 산출한다.
# 분석/전략 서술: docs/attack-coverage-gaps.md
#
# data_quality(선택, DeTT&CT 방법론): "covered" 라고 다 같은 covered 가 아니다 —
# 로그원 품질과 탐지 성숙도를 기법별로 점수화해 어떤 covered 가 실제로 신뢰 가능한지
# 구분한다(파일 하단 참조). 신규 룰 저작 시 점진적으로 채운다 — 없는 기법은 그냥
# 미채점(covered 판정 자체는 안 바뀜, append-only).

archetypes:
  A_pre_compromise:
    name: "침해 이전·네트워크 밖"
    strategy: "scope 밖 재분류 + 예방통제(네트워크 격리, EASM)"
  B_passive_collection:
    name: "수동 수집/읽기"
    strategy: "eBPF/Falco 파일·exec 감사 + VNC 세션 카운터(❌→🔜)"
  C_encrypted_c2:
    name: "암호·터널·난독 C2"
    strategy: "메타데이터·행위분석(JA3, 비콘주기, 엔드포인트 화이트리스트)"
  D_uninstrumented_exfil:
    name: "미계측 매체/채널 유출"
    strategy: "텔레메트리 컬럼 추가(SATCOM TxBytes, REST 송신 감사)"
  E_destruction_prevention:
    name: "파괴·루트킷·펌웨어모드"
    strategy: "예방통제(시큐어부트) + 호스트 밖 불변 로그(공백 역탐지)"

# 전술은 킬체인 순서(order)로 정렬 — 인접추론(coverage-by-adjacency)에 사용.
