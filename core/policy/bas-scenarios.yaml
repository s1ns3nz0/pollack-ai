# =============================================================================
# BAS(Breach & Attack Simulation) 시나리오 세트 — 방어 상시 검증
# -----------------------------------------------------------------------------
# "우리 탐지룰이 진짜 이 공격을 막나" 를 결정론으로 상시 검증한다. 각 공격 케이스를
# 방어 판정(신호 존재 + 매칭 탐지룰 존재)에 통과시켜 탐지 성공/미탐(gap)을 집계하고,
# tactic·STRIDE 별 커버리지를 산출한다. detection_rule 이 비면 = 미탐 갭(방어 공백).
#
# 출처: dah-sentinel-content AnalyticsRules/*.json — scripts/gen_bas_scenarios.py 로
# 자동 추출(재정렬/신규 룰 추가 시 재실행). stride 는 키워드 휴리스틱이라 검수 권장.
# campaign 은 C1~C33 description의 "(S<n>)" 참조를 역매핑.
# tactic 키는 data/attack_coverage.yaml tactic 이름과 일치(PascalCase).
# =============================================================================

version: 0.3
owner: 황준식

scenarios:
  - id: S1-GNSS-SPOOFING
    name: "GNSS Spoofing via EKF Variance Anomaly"
    status: deployed
    signals: ["UAV/UGV 환경에서 GNSS 스푸핑 탐지", "ArduPilot EKF_STATUS_REPORT의 PosHorizVariance/VelocityVariance를 z-score(3σ)로 이상 탐지하고, 절댓값 게이트는 최근 24h 정상 데이터(명백한 공격값 제외)의 P99 x 1.5로 동적 산출(하한 0.02)", "고정 임계값 대신 baseline 적응형 게이트를 사용해 환경 변화에 자동 추종"]
    detection_rule: S1_GNSS_Spoofing.json
    tactic: Collection
    stride: [S, T]
    campaign: [C2, C10, C14, C21, C26]

  - id: S2-PARAMETER-TAMPERING
    name: "Parameter Tampering (ARMING_CHECK/Safety Config Bypass)"
    status: deployed
    signals: ["UAV 안전 파라미터 변조 탐지", "공격자가 MAVLink PARAM_SET으로 ARMING_CHECK/BRD_SAFETYENABLE/SIM_GPS_* 등 비행통제 컨트롤러 태스킹·안전설정 파라미터를 변경해 이륙전 안전점검을 무력화하거나 GNSS 스푸핑 사전조건을 조성하는 행위 탐지", "UAVConfigAudit_CL의 param_changed 이벤트 기준"]
    detection_rule: S2_Parameter_Tampering.json
    tactic: DefenseEvasion
    stride: [S, T]

  - id: S3-UNAUTHORIZED-WEAPON-CMD
    name: "Unauthorized Weapon Command (ARM/FIRE 2-person control bypass)"
    status: deployed
    signals: ["무장(Arm)/발사(Fire) 명령의 2인통제 우회 탐지", "ArmedBy == Operator(자기승인) 또는 Watchlist에 없는 비인가 Operator/WeaponId로 ARM/FIRE 발생 시 탐지"]
    detection_rule: S3_Unauthorized_Weapon_Cmd.json
    tactic: Impact
    stride: [T, E]
    campaign: [C1, C3, C4, C15, C18]

