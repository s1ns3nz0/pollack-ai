# soc-toolserver — MCP SSE 서버. kagent 오케스트레이터가 in-cluster SSE 로 호출.
# 외부 미노출(ClusterIP). analyze_alert → soc-hotpath HTTP POST.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-toolserver
  namespace: dah-soc
  labels:
    app: soc-toolserver
    soc.role: toolserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soc-toolserver
  template:
    metadata:
      labels:
        app: soc-toolserver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001 # Dockerfile USER soc(uid 10001) — runAsNonRoot 는 숫자 UID 필요
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: toolserver
          image: ghcr.io/s1ns3nz0/uav-ai-soc:latest
          command: ["python", "-m", "app.toolserver"]
          env:
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8080"
            - name: HOTPATH_URL
              value: "http://soc-hotpath.dah-soc.svc.cluster.local:80/alert"
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: soc-toolserver
  namespace: dah-soc
  labels:
    app: soc-toolserver
spec:
  type: ClusterIP
  selector:
    app: soc-toolserver
  ports:
    - name: http
      port: 8080
      targetPort: 8080
