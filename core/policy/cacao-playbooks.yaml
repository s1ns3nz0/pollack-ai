        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:Collection:Degrade" }
        on_completion: "action--eradicate"
      action--contain-auto:
        type: action
        name: "자동 적격 봉쇄(저위험)"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "저-임무위험 — 수집 채널 자동 강등·격리 적격(운용자 통지)" }
        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:Collection:Degrade" }
        on_completion: "action--eradicate"
      action--eradicate:
        type: action
        name: "축출 — AiTM 세션 차단"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "AiTM 세션 차단 + 수집 채널·페이로드 접근 격리, 비인가 수집 프로세스 종료" }
        labels: { phase: eradicate, nist_ir: "IR-4", source_ref: "recovery:Collection:evict:0" }
        on_completion: "action--recover"
      action--recover:
        type: action
        name: "복구 — 링크 암호화 재수립"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "센서·영상 링크 암호화 재수립 + 무결성 복구" }
        labels: { phase: recover, nist_ir: "IR-4", source_ref: "recovery:Collection:restore:0" }
        external_references:
          - { source_name: "nist-800-184", external_id: "Tactical-Recovery", url: "https://csrc.nist.gov/pubs/sp/800/184/final", description: "Event Recovery" }
        on_completion: "action--recover-verify"
      action--recover-verify:
        type: action
        name: "복구 검증 — 수집 재확립 관측"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "outcome_probe 로 수집 채널 재확립(reoccurred) 관측 — 재발 시 링크 재키잉 + 세그먼트 격리" }
        labels: { phase: recover, verify: true, nist_ir: "IR-6", source_ref: "recovery:Collection:verify" }
        on_completion: "action--adapt"
      action--adapt:
        type: action
        name: "적응 — 링크 암호 다양화(회복탄력)"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "센서/영상 링크 암호 스위트 다양화 + 주파수 호핑·다중 경로(Diversity)" }
        labels: { phase: adapt, nist_ir: "IR-8", resiliency_technique: "Diversity" }
        external_references:
          - { source_name: "nist-800-160v2", external_id: "Diversity", url: "https://csrc.nist.gov/pubs/sp/800/160/v2/r1/final", description: "Cyber Resiliency" }
        on_completion: "end--0"
      end--0:
        type: end

  # ── CommandAndControl — T1071 App Layer Proto · T1090 Proxy · T1573 Encrypted Channel ──
  - type: playbook
    spec_version: cacao-2.0
    id: "playbook--uav-c2-0001"
    name: "UAV 명령제어 대응 — 비인가 C2 채널"
    description: "명령제어(응용계층 프로토콜·프록시·암호화 채널) 탐지 시 봉쇄→축출→복구→적응. 임무게이트 분기."
    created: "2026-07-09T00:00:00Z"
    modified: "2026-07-09T00:00:00Z"
    created_by: "황준식"
    playbook_types: ["mitigation", "remediation"]
    playbook_activities: ["step-sequence"]
    tactic: "CommandAndControl"
    workflow_start: "start--0"
    agent_definitions:
      agent--analyst:
        type: individual
        name: "uav-soc-analyst"
    external_references:
      - { source_name: "mitre-attack", external_id: "T1071", url: "https://attack.mitre.org/techniques/T1071", description: "Application Layer Protocol" }
      - { source_name: "mitre-attack", external_id: "T1090", url: "https://attack.mitre.org/techniques/T1090", description: "Proxy" }
      - { source_name: "mitre-attack", external_id: "T1573", url: "https://attack.mitre.org/techniques/T1573", description: "Encrypted Channel" }
      - { source_name: "nist-800-53", external_id: "IR-8", description: "Incident Response Plan" }
    labels: { framework: "cacao-2.0" }
    workflow:
      start--0:
        type: start
        on_completion: "action--contain"
      action--contain:
        type: action
        name: "봉쇄 — C2 채널 교란"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "비인가 C2 채널 교란·비콘 차단, 채널 화이트리스트 강제·프록시 경유 거부" }
        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:CommandAndControl:Disrupt" }
        external_references:
          - { source_name: "nist-800-61", external_id: "Containment", description: "800-61 lifecycle" }
        on_completion: "if--mission-gate"
      if--mission-gate:
        type: if-condition
        name: "임무영향 게이트"
        condition: 'mission_risk.score >= 6 or mission_risk.factors["civil_geo"] >= 1'
        labels: { mission_gate: true }
        on_true: "action--contain-hitl"
        on_false: "action--contain-auto"
      action--contain-hitl:
        type: action
        name: "보수 봉쇄 — HITL 링크 재확립"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "운용자 승인 후 신뢰 링크로 지휘통제 재확립 후 비인가 채널 거부(단일 링크 즉단 금지)" }
        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:CommandAndControl:Deny" }
        on_completion: "action--eradicate"
      action--contain-auto:
        type: action
        name: "자동 적격 봉쇄(저위험)"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "저-임무위험 — 비인가 C2 자동 탐지·차단 적격(운용자 통지)" }
        labels: { phase: contain, nist_ir: "IR-4", source_ref: "coa:CommandAndControl:Detect" }
        on_completion: "action--eradicate"
      action--eradicate:
        type: action
        name: "축출 — C2 세션 강제 종료"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "C2 세션 강제 종료 + 미인가 연결 축출, 탈취 자격증명 회전 + 채널 화이트리스트 재적용" }
        labels: { phase: eradicate, nist_ir: "IR-4", source_ref: "recovery:CommandAndControl:evict:0" }
        on_completion: "action--recover"
      action--recover:
        type: action
        name: "복구 — 대체 링크 지휘통제 복구"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "대체 링크로 지휘통제 복구 + 세션 재확립" }
        labels: { phase: recover, nist_ir: "IR-4", source_ref: "recovery:CommandAndControl:restore:0" }
        external_references:
          - { source_name: "nist-800-184", external_id: "Tactical-Recovery", url: "https://csrc.nist.gov/pubs/sp/800/184/final", description: "Event Recovery" }
        on_completion: "action--recover-verify"
      action--recover-verify:
        type: action
        name: "복구 검증 — C2 재확립 관측"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "outcome_probe 로 미인가 C2 재확립(reoccurred) 관측 — 재발 시 링크 전면 리셋 + 키 롤오버" }
        labels: { phase: recover, verify: true, nist_ir: "IR-6", source_ref: "recovery:CommandAndControl:verify" }
        on_completion: "action--adapt"
      action--adapt:
        type: action
        name: "적응 — C2 경로 다양화(회복탄력)"
        agent: "agent--analyst"
        commands:
          - { type: manual, command: "지휘통제 링크 다중화·이기종화 + 비콘 이상 탐지 상시화(Diversity)" }
        labels: { phase: adapt, nist_ir: "IR-8", resiliency_technique: "Diversity" }
        external_references:
          - { source_name: "nist-800-160v2", external_id: "Diversity", url: "https://csrc.nist.gov/pubs/sp/800/160/v2/r1/final", description: "Cyber Resiliency" }
        on_completion: "end--0"
      end--0:
        type: end

  # ── Exfiltration — T1041 Exfil over C2 · T1020 Automated Exfil · T1048 Alt Protocol ──
  - type: playbook
